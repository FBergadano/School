<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Newton's Second Law of Motion</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');
  :root{--bg:#0d0a08;--copper:#b87333;--copper-bright:#e8983a;--text-primary:#e8d5b0;--text-secondary:#9a8060;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text-primary);font-family:'Crimson Text',serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden;user-select:none;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(184,115,51,.05)0%,transparent 60%);pointer-events:none;z-index:0;}
  header{text-align:center;padding:1.4rem 2rem .6rem;position:relative;z-index:1;}
  .year-badge{font-size:.78rem;letter-spacing:.42em;color:var(--copper);text-transform:uppercase;margin-bottom:.4rem;display:block;}
  h1{font-family:'Playfair Display',serif;font-size:clamp(1.4rem,3vw,2.2rem);font-weight:700;line-height:1.1;margin-bottom:.3rem;}
  h1 em{color:var(--copper-bright);}
  .ornament{display:flex;align-items:center;gap:1rem;justify-content:center;margin:.4rem 0;}
  .ornament::before,.ornament::after{content:'';width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--copper));}
  .ornament::after{background:linear-gradient(90deg,var(--copper),transparent);}
  .ornament-diamond{width:6px;height:6px;background:var(--copper);transform:rotate(45deg);}
  .stage{width:100%;max-width:1050px;padding:0 1.2rem 2rem;display:flex;flex-direction:column;align-items:center;gap:.85rem;position:relative;z-index:1;}
  .canvas-wrap{width:100%;border:1px solid rgba(184,115,51,.22);border-radius:5px;background:#1a1208;overflow:hidden;box-shadow:0 0 60px rgba(184,115,51,.07),inset 0 0 30px rgba(0,0,0,.6);}
  canvas{display:block;width:100%;height:auto;cursor:default;}
  .panels{display:flex;flex-wrap:wrap;gap:.7rem;width:100%;justify-content:center;}
  .panel{background:rgba(10,8,5,.85);border:1px solid rgba(184,115,51,.22);border-radius:6px;padding:.65rem 1rem;display:flex;flex-direction:column;gap:.45rem;min-width:220px;flex:1;}
  .panel-title{font-family:'Playfair Display',serif;font-size:.8rem;letter-spacing:.12em;text-transform:uppercase;color:var(--copper);border-bottom:1px solid rgba(184,115,51,.18);padding-bottom:.3rem;margin-bottom:.1rem;}
  .panel-title.f1c{color:#ff8866;}
  .panel-title.f2c{color:#66bbff;}
  .slider-row{display:flex;align-items:center;gap:.6rem;}
  .slider-row label{font-size:.82rem;color:var(--text-secondary);width:68px;flex-shrink:0;}
  .slider-row .val{font-size:.82rem;color:var(--copper-bright);font-weight:600;min-width:60px;text-align:right;}
  input[type=range]{-webkit-appearance:none;flex:1;height:5px;background:rgba(184,115,51,.22);border-radius:3px;outline:none;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:var(--copper);border-radius:50%;cursor:pointer;}
  input[type=range]::-moz-range-thumb{width:14px;height:14px;background:var(--copper);border-radius:50%;border:none;cursor:pointer;}
  .f1r::-webkit-slider-thumb{background:#ff7755 !important;}
  .f1r::-moz-range-thumb{background:#ff7755 !important;}
  .f2r::-webkit-slider-thumb{background:#44aaff !important;}
  .f2r::-moz-range-thumb{background:#44aaff !important;}
  .readout-panel{display:flex;gap:.65rem;width:100%;justify-content:center;flex-wrap:wrap;}
  .readout{background:rgba(10,8,5,.85);border:1px solid rgba(184,115,51,.22);border-radius:6px;padding:.5rem 1rem;display:flex;align-items:baseline;gap:.4rem;flex:1;min-width:120px;max-width:180px;justify-content:center;}
  .rlabel{font-size:.76rem;color:var(--text-secondary);}
  .rval{font-family:'Playfair Display',serif;font-size:1.28rem;font-weight:700;}
  .runit{font-size:.74rem;color:var(--text-secondary);}
  .btn-bar{display:flex;flex-wrap:wrap;gap:.6rem;justify-content:center;width:100%;}
  .btn{font-family:'Playfair Display',serif;font-size:.86rem;padding:.4rem 1rem;border-radius:3px;cursor:pointer;letter-spacing:.05em;transition:background .18s,color .18s,box-shadow .18s;}
  .btn-fvecs{background:none;border:1.5px solid #ff8866;color:#ff8866;}
  .btn-fvecs:hover,.btn-fvecs.active{background:#ff8866;color:#0d0a08;box-shadow:0 0 12px rgba(255,136,102,.35);}
  .btn-ftot{background:none;border:1.5px solid #ccff44;color:#ccff44;}
  .btn-ftot:hover,.btn-ftot.active{background:#ccff44;color:#0d0a08;box-shadow:0 0 12px rgba(200,255,68,.35);}
  .btn-astro2{background:none;border:1.5px solid #aa88ff;color:#aa88ff;}
  .btn-astro2:hover,.btn-astro2.active{background:#aa88ff;color:#0d0a08;box-shadow:0 0 12px rgba(170,136,255,.35);}
  .btn-go{background:none;border:1.5px solid var(--copper-bright);color:var(--copper-bright);}
  .btn-go:hover,.btn-go.active{background:var(--copper-bright);color:#0d0a08;}
  .btn-reset{background:none;border:1.5px solid var(--copper);color:var(--copper);}
  .btn-reset:hover{background:var(--copper);color:#0d0a08;}
  #panelF2{display:none;}
</style>
</head>
<body>
<header>
  <span class="year-badge">England · 1687 — Isaac Newton</span>
  <h1>Newton's <em>Second Law</em> of Motion</h1>
  <div class="ornament"><div class="ornament-diamond"></div></div>
</header>

<div class="stage">
  <div class="canvas-wrap"><canvas id="c" width="1050" height="520"></canvas></div>

  <!-- Live readouts -->
  <div class="readout-panel">
    <div class="readout">
      <span class="rlabel">F&#x2081;</span>
      <span class="rval" id="rdF1" style="color:#ff8866">—</span>
      <span class="runit">N</span>
    </div>
    <div class="readout" id="rdF2wrap" style="display:none">
      <span class="rlabel">F&#x2082;</span>
      <span class="rval" id="rdF2" style="color:#66bbff">—</span>
      <span class="runit">N</span>
    </div>
    <div class="readout" id="rdFtotWrap" style="display:none">
      <span class="rlabel">F<sub>tot</sub></span>
      <span class="rval" id="rdFtot" style="color:#ccff44">—</span>
      <span class="runit">N</span>
    </div>
    <div class="readout">
      <span class="rlabel">mass</span>
      <span class="rval" id="rdMass" style="color:var(--copper-bright)">8.0</span>
      <span class="runit">kg</span>
    </div>
    <div class="readout">
      <span class="rlabel">|a|</span>
      <span class="rval" id="rdAcc" style="color:#ff77dd">0.00</span>
      <span class="runit">m/s²</span>
    </div>
  </div>

  <!-- Sliders -->
  <div class="panels">
    <div class="panel" id="panelF1">
      <div class="panel-title f1c">Astronaut 1 — F&#x2081;</div>
      <div class="slider-row">
        <label>Direction</label>
        <input type="range" class="f1r" id="f1Dir" min="0" max="359" step="1" value="207">
        <span class="val" id="f1DirVal">207°</span>
      </div>
      <div class="slider-row">
        <label>Force</label>
        <input type="range" class="f1r" id="f1Mag" min="20" max="480" step="5" value="250">
        <span class="val" id="f1MagVal">250 N</span>
      </div>
    </div>
    <div class="panel" id="panelF2">
      <div class="panel-title f2c">Astronaut 2 — F&#x2082;</div>
      <div class="slider-row">
        <label>Direction</label>
        <input type="range" class="f2r" id="f2Dir" min="0" max="359" step="1" value="30">
        <span class="val" id="f2DirVal">30°</span>
      </div>
      <div class="slider-row">
        <label>Force</label>
        <input type="range" class="f2r" id="f2Mag" min="20" max="480" step="5" value="230">
        <span class="val" id="f2MagVal">230 N</span>
      </div>
    </div>
    <div class="panel">
      <div class="panel-title">Crate</div>
      <div class="slider-row">
        <label>Mass</label>
        <input type="range" id="massRange" min="1" max="30" step="0.5" value="8">
        <span class="val" id="massVal">8.0 kg</span>
      </div>
    </div>
  </div>

  <!-- Buttons -->
  <div class="btn-bar">
    <button class="btn btn-fvecs"  id="btnFvecs"  onclick="toggleFvecs()">Show F&#x2081; vector</button>
    <button class="btn btn-ftot"   id="btnFtot"   onclick="toggleFtot()">Show F<sub>tot</sub></button>
    <button class="btn btn-astro2" id="btnAstro2" onclick="toggleAstro2()">+ 2nd Astronaut</button>
    <button class="btn btn-go"     id="btnGo"     onclick="toggleSim()">&#9654; Start simulation</button>
    <button class="btn btn-reset"                 onclick="resetSim()">&#8635; Reset</button>
  </div>
</div>

<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const W=1050,H=520,CW=74,CH=64;
let crateX=525,crateY=260;
const crateX0=525,crateY0=260;
let f1={ang:Math.atan2(-120,-230),mag:250};
let f2={ang:Math.atan2(115,-200),mag:230};
let simRunning=false,showFtot=false,showForces=false,showAstro2=false;
let crateVX=0,crateVY=0,mass=8,tick=0,trailPoints=[],dragging=null;

// direction convention: slider 0-359 maps so that 0° = right, 90° = down, etc.
// We add 180° because the force pulls TOWARD the astronaut (away from crate)
function degToAng(deg){return ((deg+180)*Math.PI/180);}
function angToDeg(ang){let d=(ang*180/Math.PI-180+720)%360;return Math.round(d);}

function syncF1(){
  const deg=+document.getElementById('f1Dir').value;
  const mag=+document.getElementById('f1Mag').value;
  f1.ang=degToAng(deg); f1.mag=mag;
  document.getElementById('f1DirVal').textContent=deg+'°';
  document.getElementById('f1MagVal').textContent=mag+' N';
}
function syncF2(){
  const deg=+document.getElementById('f2Dir').value;
  const mag=+document.getElementById('f2Mag').value;
  f2.ang=degToAng(deg); f2.mag=mag;
  document.getElementById('f2DirVal').textContent=deg+'°';
  document.getElementById('f2MagVal').textContent=mag+' N';
}
function pushSlidersF1(){
  const d=angToDeg(f1.ang);
  document.getElementById('f1Dir').value=d;
  document.getElementById('f1DirVal').textContent=d+'°';
  document.getElementById('f1Mag').value=Math.round(f1.mag);
  document.getElementById('f1MagVal').textContent=Math.round(f1.mag)+' N';
}
function pushSlidersF2(){
  const d=angToDeg(f2.ang);
  document.getElementById('f2Dir').value=d;
  document.getElementById('f2DirVal').textContent=d+'°';
  document.getElementById('f2Mag').value=Math.round(f2.mag);
  document.getElementById('f2MagVal').textContent=Math.round(f2.mag)+' N';
}

document.getElementById('f1Dir').addEventListener('input',syncF1);
document.getElementById('f1Mag').addEventListener('input',syncF1);
document.getElementById('f2Dir').addEventListener('input',syncF2);
document.getElementById('f2Mag').addEventListener('input',syncF2);
document.getElementById('massRange').addEventListener('input',function(){
  mass=+this.value;
  document.getElementById('massVal').textContent=mass.toFixed(1)+' kg';
  document.getElementById('rdMass').textContent=mass.toFixed(1);
});

function updateReadouts(v1x,v1y,v2x,v2y){
  const rx=showAstro2?v1x+v2x:v1x,ry=showAstro2?v1y+v2y:v1y;
  document.getElementById('rdF1').textContent=Math.hypot(v1x,v1y).toFixed(0);
  if(showAstro2)document.getElementById('rdF2').textContent=Math.hypot(v2x,v2y).toFixed(0);
  if(showFtot)document.getElementById('rdFtot').textContent=Math.hypot(rx,ry).toFixed(0);
  document.getElementById('rdAcc').textContent=(Math.hypot(rx,ry)/mass).toFixed(2);
}

function toggleFvecs(){
  showForces=!showForces;
  document.getElementById('btnFvecs').classList.toggle('active',showForces);
  document.getElementById('btnFvecs').innerHTML=showForces
    ?(showAstro2?'Hide F&#x2081; &amp; F&#x2082; vectors':'Hide F&#x2081; vector')
    :(showAstro2?'Show F&#x2081; &amp; F&#x2082; vectors':'Show F&#x2081; vector');
}
function toggleFtot(){
  showFtot=!showFtot;
  document.getElementById('btnFtot').classList.toggle('active',showFtot);
  document.getElementById('rdFtotWrap').style.display=showFtot?'flex':'none';
}
function toggleAstro2(){
  showAstro2=!showAstro2;
  document.getElementById('btnAstro2').classList.toggle('active',showAstro2);
  document.getElementById('panelF2').style.display=showAstro2?'flex':'none';
  document.getElementById('rdF2wrap').style.display=showAstro2?'flex':'none';
  document.getElementById('btnFvecs').innerHTML=showAstro2
    ?(showForces?'Hide F&#x2081; &amp; F&#x2082; vectors':'Show F&#x2081; &amp; F&#x2082; vectors')
    :(showForces?'Hide F&#x2081; vector':'Show F&#x2081; vector');
}
function toggleSim(){
  simRunning=!simRunning;
  const b=document.getElementById('btnGo');
  b.innerHTML=simRunning?'&#9646;&#9646; Pause':'&#9654; Start simulation';
  b.classList.toggle('active',simRunning);
}
function resetSim(){
  simRunning=false;crateX=crateX0;crateY=crateY0;
  crateVX=0;crateVY=0;trailPoints=[];
  document.getElementById('btnGo').innerHTML='&#9654; Start simulation';
  document.getElementById('btnGo').classList.remove('active');
}

function toC(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*(W/r.width),y:(e.clientY-r.top)*(H/r.height)};}
function tryStart(px,py){
  if(simRunning)return;
  const t1={x:crateX+Math.cos(f1.ang)*f1.mag,y:crateY+Math.sin(f1.ang)*f1.mag};
  if(Math.hypot(px-t1.x,py-t1.y)<20){dragging='f1';return;}
  if(showAstro2){
    const t2={x:crateX+Math.cos(f2.ang)*f2.mag,y:crateY+Math.sin(f2.ang)*f2.mag};
    if(Math.hypot(px-t2.x,py-t2.y)<20){dragging='f2';return;}
  }
}
function doMove(px,py){
  if(!dragging)return;
  const f=dragging==='f1'?f1:f2;
  f.ang=Math.atan2(py-crateY,px-crateX);
  const cosA=Math.abs(Math.cos(f.ang))||.001,sinA=Math.abs(Math.sin(f.ang))||.001;
  const roomX=px>crateX?W-20-crateX:crateX-20,roomY=py>crateY?H-20-crateY:crateY-20;
  f.mag=Math.max(20,Math.min(Math.hypot(px-crateX,py-crateY),roomX/cosA,roomY/sinA,480));
  if(dragging==='f1')pushSlidersF1();else pushSlidersF2();
}
canvas.addEventListener('mousedown',e=>{const p=toC(e);tryStart(p.x,p.y);});
canvas.addEventListener('mousemove',e=>{if(dragging){const p=toC(e);doMove(p.x,p.y);}});
canvas.addEventListener('mouseup',()=>dragging=null);
canvas.addEventListener('mouseleave',()=>dragging=null);
canvas.addEventListener('touchstart',e=>{e.preventDefault();const p=toC(e.touches[0]);tryStart(p.x,p.y);},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();if(dragging){const p=toC(e.touches[0]);doMove(p.x,p.y);}},{passive:false});
canvas.addEventListener('touchend',()=>dragging=null);

function shadeCol(hex,pct){
  const n=parseInt(hex.replace('#',''),16),a=Math.round(2.55*pct);
  const R=Math.max(0,Math.min(255,(n>>16)+a)),G=Math.max(0,Math.min(255,(n>>8&255)+a)),B=Math.max(0,Math.min(255,(n&255)+a));
  return'#'+(0x1000000+R*65536+G*256+B).toString(16).slice(1);
}
function arrow(x1,y1,x2,y2,col,lw,hs){
  const dx=x2-x1,dy=y2-y1,a=Math.atan2(dy,dx);
  if(Math.hypot(dx,dy)<6)return;
  ctx.save();ctx.strokeStyle=col;ctx.fillStyle=col;ctx.lineWidth=lw;ctx.shadowColor=col;ctx.shadowBlur=8;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.shadowBlur=0;
  ctx.beginPath();ctx.moveTo(x2,y2);
  ctx.lineTo(x2-hs*Math.cos(a-Math.PI/6),y2-hs*Math.sin(a-Math.PI/6));
  ctx.lineTo(x2-hs*Math.cos(a+Math.PI/6),y2-hs*Math.sin(a+Math.PI/6));
  ctx.closePath();ctx.fill();ctx.restore();
}
function vecLabel(lbl,x,y,col,fs){
  ctx.save();ctx.fillStyle=col;ctx.font=`italic bold ${fs}px 'Playfair Display',serif`;
  ctx.textAlign='center';ctx.textBaseline='alphabetic';ctx.fillText(lbl,x,y);
  const lw=ctx.measureText(lbl).width,aw=lw*.82,ay=y-fs*.86,th=fs*.13;
  ctx.strokeStyle=col;ctx.lineWidth=fs*.09;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(x-aw/2,ay);ctx.lineTo(x+aw/2,ay);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x+aw/2,ay);ctx.lineTo(x+aw/2-th*1.3,ay-th);ctx.lineTo(x+aw/2-th*1.3,ay+th);ctx.closePath();ctx.fill();
  ctx.restore();
}
function perp(dx,dy){const l=Math.hypot(dx,dy)||1;return{x:-dy/l,y:dx/l};}

// ── Space background — seeded once, drawn every frame (static, dim) ────────
const RNG=(s)=>{let x=s;return()=>{x=Math.sin(x)*43758.5453123;return x-Math.floor(x);};};
const rng=RNG(42);
// Stars: [x, y, radius, alpha, hue-shift]
const STARS=(()=>{const a=[];for(let i=0;i<210;i++){const r=rng()*rng()*2.4+.18;a.push([rng()*W,rng()*H,r,rng()*.45+.08,rng()]);}return a;})();
// Faint dust clouds: [cx,cy,rx,ry,rot,col,alpha]
const CLOUDS=[
  [160,110,130,55,-.3,'120,90,60',.028],
  [880,380,110,50,.5,'80,110,160',.022],
  [530,440,90,38,.1,'100,80,140',.018],
  [75,330,80,40,-.6,'80,130,110',.016],
  [940,120,100,44,.4,'110,90,70',.02],
];
// Planets: [cx,cy,r, bodyCol, ringCol, ringAlpha, hasRing, rimCol]
const PLANETS=[
  {cx:88,cy:68,r:22,body:'#4a3828',rim:'#7a5838',ring:'#c8a050',ra:.18,hasRing:true,tilt:.38},
  {cx:962,cy:430,r:14,body:'#2a3848',rim:'#4a6888',ring:null,ra:0,hasRing:false},
];
// Distant galaxies: [cx,cy,rx,ry,rot,col,alpha]
const GALAXIES=[
  {cx:820,cy:55,rx:38,ry:12,rot:.3,col:'180,160,220',a:.09},
  {cx:200,cy:400,rx:22,ry:7,rot:-.5,col:'180,200,160',a:.07},
];

function drawBg(){
  // Deep space gradient
  const bg=ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,'#13100d');bg.addColorStop(.5,'#0e0b09');bg.addColorStop(1,'#090705');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // Subtle floor hatching (original touch, kept very dim)
  ctx.strokeStyle='rgba(184,115,51,.045)';ctx.lineWidth=1;
  for(let x=0;x<W;x+=44){ctx.beginPath();ctx.moveTo(x,H-10);ctx.lineTo(x+22,H+2);ctx.stroke();}

  ctx.save();

  // Nebula dust clouds
  CLOUDS.forEach(([cx,cy,rx,ry,rot,col,al])=>{
    ctx.save();ctx.translate(cx,cy);ctx.rotate(rot);
    const g=ctx.createRadialGradient(0,0,0,0,0,Math.max(rx,ry));
    g.addColorStop(0,`rgba(${col},${al})`);g.addColorStop(.55,`rgba(${col},${al*.4})`);g.addColorStop(1,`rgba(${col},0)`);
    ctx.fillStyle=g;ctx.scale(1,ry/rx);ctx.beginPath();ctx.arc(0,0,rx,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });

  // Distant galaxies (faint elliptical smears with a bright core)
  GALAXIES.forEach(({cx,cy,rx,ry,rot,col,a})=>{
    ctx.save();ctx.translate(cx,cy);ctx.rotate(rot);
    const g=ctx.createRadialGradient(0,0,0,0,0,rx);
    g.addColorStop(0,`rgba(${col},${a*2.2})`);g.addColorStop(.35,`rgba(${col},${a})`);g.addColorStop(1,`rgba(${col},0)`);
    ctx.fillStyle=g;ctx.scale(1,ry/rx);ctx.beginPath();ctx.arc(0,0,rx,0,Math.PI*2);ctx.fill();
    // faint spiral arms hint
    ctx.scale(1,rx/ry);ctx.globalAlpha=a*.5;ctx.strokeStyle=`rgba(${col},1)`;ctx.lineWidth=.8;
    for(let arm=0;arm<2;arm++){
      ctx.beginPath();
      for(let t=0;t<Math.PI*1.6;t+=.06){
        const sr=t*rx*.28,sx=Math.cos(t+arm*Math.PI)*sr,sy=Math.sin(t+arm*Math.PI)*sr*(ry/rx);
        t===0?ctx.moveTo(sx,sy):ctx.lineTo(sx,sy);
      }
      ctx.stroke();
    }
    ctx.globalAlpha=1;ctx.restore();
  });

  // Planets
  PLANETS.forEach(({cx,cy,r,body,rim,ring,ra,hasRing,tilt=0})=>{
    ctx.save();ctx.translate(cx,cy);

    // ring behind planet
    if(hasRing){
      ctx.save();ctx.rotate(tilt);ctx.scale(1,.28);
      ctx.strokeStyle=`rgba(200,160,80,${ra*.6})`;ctx.lineWidth=4;
      ctx.beginPath();ctx.arc(0,0,r*2.1,0,Math.PI*2);ctx.stroke();
      ctx.strokeStyle=`rgba(220,180,100,${ra*.35})`;ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(0,0,r*2.5,0,Math.PI*2);ctx.stroke();
      ctx.restore();
    }

    // planet body
    const pg=ctx.createRadialGradient(-r*.3,-r*.3,r*.1,0,0,r);
    pg.addColorStop(0,rim);pg.addColorStop(.6,body);pg.addColorStop(1,'#060504');
    ctx.fillStyle=pg;ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();

    // ring in front (top half clipped)
    if(hasRing){
      ctx.save();ctx.rotate(tilt);ctx.scale(1,.28);
      ctx.beginPath();ctx.rect(-r*3,0,r*6,r*3);ctx.clip();
      ctx.strokeStyle=`rgba(200,160,80,${ra*.6})`;ctx.lineWidth=4;
      ctx.beginPath();ctx.arc(0,0,r*2.1,0,Math.PI*2);ctx.stroke();
      ctx.strokeStyle=`rgba(220,180,100,${ra*.35})`;ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(0,0,r*2.5,0,Math.PI*2);ctx.stroke();
      ctx.restore();
    }
    ctx.restore();
  });

  // Stars (drawn last, over everything, still very dim)
  STARS.forEach(([sx,sy,sr,sa,hs])=>{
    // faint colour tint: blue-white, yellow-white, pure white
    const hue=hs<.33?210:hs<.66?45:0;
    const sat=hue===0?0:40;
    ctx.fillStyle=`hsla(${hue},${sat}%,96%,${sa})`;
    ctx.beginPath();ctx.arc(sx,sy,sr,0,Math.PI*2);ctx.fill();
    // tiny cross-glint for the slightly larger ones
    if(sr>1.4){
      ctx.strokeStyle=`hsla(${hue},${sat}%,98%,${sa*.5})`;ctx.lineWidth=.6;
      ctx.beginPath();ctx.moveTo(sx-sr*2.2,sy);ctx.lineTo(sx+sr*2.2,sy);ctx.stroke();
      ctx.beginPath();ctx.moveTo(sx,sy-sr*2.2);ctx.lineTo(sx,sy+sr*2.2);ctx.stroke();
    }
  });

  ctx.restore();
}
function drawTrail(){
  if(trailPoints.length<2)return;
  ctx.save();
  for(let i=1;i<trailPoints.length;i++){
    ctx.strokeStyle=`rgba(200,255,68,${i/trailPoints.length*.65})`;ctx.lineWidth=2;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(trailPoints[i-1].x,trailPoints[i-1].y);ctx.lineTo(trailPoints[i].x,trailPoints[i].y);ctx.stroke();
  }
  ctx.restore();
}
function drawCrate(lurch){
  ctx.save();ctx.translate(crateX+lurch*2,crateY);ctx.rotate(lurch*.022);
  ctx.fillStyle='rgba(0,0,0,.32)';ctx.beginPath();ctx.ellipse(0,CH/2+5,CW*.65,8,0,0,Math.PI*2);ctx.fill();
  const g=ctx.createLinearGradient(-CW/2,-CH/2,CW/2,CH/2);
  g.addColorStop(0,'#a0622a');g.addColorStop(.5,'#b87333');g.addColorStop(1,'#7a4220');
  ctx.fillStyle=g;ctx.strokeStyle='#5a3010';ctx.lineWidth=2;
  ctx.beginPath();ctx.roundRect(-CW/2,-CH/2,CW,CH,4);ctx.fill();ctx.stroke();
  ctx.strokeStyle='rgba(90,48,16,.5)';ctx.lineWidth=1.2;
  [-CH/3,0,CH/3].forEach(ly=>{ctx.beginPath();ctx.moveTo(-CW/2,ly);ctx.lineTo(CW/2,ly);ctx.stroke();});
  ctx.beginPath();ctx.moveTo(0,-CH/2);ctx.lineTo(0,CH/2);ctx.stroke();
  ctx.fillStyle='rgba(255,200,140,.18)';ctx.beginPath();ctx.roundRect(-CW/2,-CH/2,CW,CH/4,4);ctx.fill();
  ctx.fillStyle='rgba(232,213,176,.85)';ctx.font='bold 11px Playfair Display,serif';
  ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(`${mass.toFixed(1)} kg`,0,2);
  ctx.restore();
}

// effort = f.mag/480  → 0 to 1, directly controls flame length & width
function drawMan(handWX,handWY,faceDir,effort,suitCol,t){
  const lean=effort*.25,stride=Math.sin(t*.13)*effort*14;
  const dark=shadeCol(suitCol,-50),mid=shadeCol(suitCol,-20),light=shadeCol(suitCol,45);
  const hipX=-lean*10,hipY=-56+lean*4,shX=hipX-lean*18,shY=hipY-38;
  const reachX=-26-effort*24,reachY=-effort*8,fhX=shX+reachX,fhY=shY+reachY-4;
  const c=Math.cos(faceDir),s=Math.sin(faceDir);
  const footX=handWX-(fhX*c-fhY*s),footY=handWY-(fhX*s+fhY*c);
  ctx.save();ctx.translate(footX,footY);ctx.rotate(faceDir);

  // boots
  ctx.fillStyle=dark;
  ctx.beginPath();ctx.ellipse(-stride*.28-5,2,12,6,lean*.2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(stride*.28+3,2,13,6,lean*.2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=mid;
  ctx.beginPath();ctx.ellipse(-stride*.28-5,0,8,3,lean*.2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(stride*.28+3,0,9,3,lean*.2,0,Math.PI*2);ctx.fill();

  // legs
  ctx.lineCap='round';ctx.lineJoin='round';
  ctx.lineWidth=13;ctx.strokeStyle=dark;
  ctx.beginPath();ctx.moveTo(hipX-3,hipY);ctx.quadraticCurveTo(-stride*.45-lean*10,-28+Math.abs(stride)*.15,-stride*.28-5,-2);ctx.stroke();
  ctx.lineWidth=9;ctx.strokeStyle=mid;
  ctx.beginPath();ctx.moveTo(hipX-3,hipY);ctx.quadraticCurveTo(-stride*.45-lean*10,-28+Math.abs(stride)*.15,-stride*.28-5,-2);ctx.stroke();
  ctx.lineWidth=13;ctx.strokeStyle=suitCol;
  ctx.beginPath();ctx.moveTo(hipX+3,hipY);ctx.quadraticCurveTo(stride*.45-lean*10,-28+Math.abs(stride)*.2,stride*.28+3,-2);ctx.stroke();
  ctx.lineWidth=9;ctx.strokeStyle=light;
  ctx.beginPath();ctx.moveTo(hipX+5,hipY);ctx.quadraticCurveTo(stride*.45-lean*8,-26+Math.abs(stride)*.2,stride*.28+5,-3);ctx.stroke();
  [{kx:-stride*.45-lean*10,ky:-28},{kx:stride*.45-lean*10,ky:-28}].forEach(({kx,ky})=>{
    ctx.strokeStyle=dark;ctx.lineWidth=4;ctx.beginPath();ctx.arc(kx,ky,6,0,Math.PI*2);ctx.stroke();
  });

  drawJetpack(shX,shY,effort);

  // torso
  const tw=22,th=38;
  ctx.save();ctx.translate(shX+tw*.05,shY+th*.3);ctx.rotate(lean*.3);
  const tg=ctx.createLinearGradient(-tw,0,tw,0);
  tg.addColorStop(0,dark);tg.addColorStop(.45,suitCol);tg.addColorStop(.7,light);tg.addColorStop(1,mid);
  ctx.fillStyle=tg;ctx.strokeStyle=dark;ctx.lineWidth=2;
  ctx.beginPath();ctx.roundRect(-tw,-th*.5,tw*2,th,8);ctx.fill();ctx.stroke();
  ctx.fillStyle=dark;ctx.strokeStyle=mid;ctx.lineWidth=1;
  ctx.beginPath();ctx.roundRect(-tw*.5,-th*.3,tw,th*.55,4);ctx.fill();ctx.stroke();
  [[-tw*.3,-th*.1,'#ff4444'],[-tw*.05,-th*.1,'#44ff88'],[tw*.2,-th*.1,'#ffaa00']].forEach(([lx,ly,lc])=>{
    ctx.fillStyle=lc;ctx.shadowColor=lc;ctx.shadowBlur=6;ctx.beginPath();ctx.arc(lx,ly,2.5,0,Math.PI*2);ctx.fill();
  });
  ctx.shadowBlur=0;ctx.strokeStyle=dark;ctx.lineWidth=4;
  ctx.beginPath();ctx.arc(-tw,-th*.4,5,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(tw,-th*.4,5,0,Math.PI*2);ctx.stroke();
  ctx.restore();

  // helmet
  const helmX=shX-lean*3,helmY=shY-44;
  const hg=ctx.createRadialGradient(helmX-4,helmY-6,4,helmX,helmY,20);
  hg.addColorStop(0,light);hg.addColorStop(.6,suitCol);hg.addColorStop(1,dark);
  ctx.fillStyle=hg;ctx.strokeStyle=dark;ctx.lineWidth=2.5;
  ctx.beginPath();ctx.arc(helmX,helmY,19,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.fillStyle=dark;ctx.strokeStyle=mid;ctx.lineWidth=2;
  ctx.beginPath();ctx.ellipse(shX,shY-10,10,6,lean*.2,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.save();ctx.translate(helmX,helmY);
  const vg=ctx.createLinearGradient(-14,-10,4,8);
  vg.addColorStop(0,'#88ddff');vg.addColorStop(.5,'#22aaee');vg.addColorStop(1,'#115577');
  ctx.fillStyle=vg;ctx.strokeStyle='#0a3344';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.ellipse(-3,1,13,11,0,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.fillStyle='rgba(200,240,255,0.45)';ctx.beginPath();ctx.ellipse(-7,-4,5,3,-.4,0,Math.PI*2);ctx.fill();
  ctx.restore();
  if(effort>.3){
    ctx.fillStyle='#ff2200';ctx.shadowColor='#ff4400';ctx.shadowBlur=10;
    ctx.beginPath();ctx.arc(helmX+12,helmY-12,3.5,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  }

  // arms
  const bhX=shX+reachX,bhY=shY+12+reachY;
  ctx.lineWidth=11;ctx.strokeStyle=dark;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(shX-4,shY-th*.1+5);ctx.quadraticCurveTo(shX+reachX*.5,shY+6+reachY*.3,bhX,bhY);ctx.stroke();
  ctx.lineWidth=7;ctx.strokeStyle=mid;
  ctx.beginPath();ctx.moveTo(shX-4,shY-th*.1+5);ctx.quadraticCurveTo(shX+reachX*.5,shY+6+reachY*.3,bhX,bhY);ctx.stroke();
  ctx.lineWidth=11;ctx.strokeStyle=suitCol;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(shX+4,shY-th*.1);ctx.quadraticCurveTo(shX+reachX*.5,shY+reachY*.4,fhX,fhY);ctx.stroke();
  ctx.lineWidth=7;ctx.strokeStyle=light;
  ctx.beginPath();ctx.moveTo(shX+6,shY-th*.1);ctx.quadraticCurveTo(shX+reachX*.5+2,shY+reachY*.4,fhX+1,fhY);ctx.stroke();
  [[bhX,bhY,dark],[fhX,fhY,suitCol]].forEach(([gx,gy,gc])=>{
    ctx.strokeStyle=dark;ctx.lineWidth=4;ctx.beginPath();ctx.arc(gx,gy,6,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle=gc;ctx.lineWidth=1;ctx.strokeStyle=dark;ctx.beginPath();ctx.arc(gx,gy,5,0,Math.PI*2);ctx.fill();ctx.stroke();
  });
  ctx.restore();
}

// Flame length & width are direct linear functions of effort (= mag/480)
// minFlame at effort=0, maxFlame at effort=1
function drawJetpack(shX,shY,effort){
  ctx.save();
  const jx=shX+16,jy=shY-22,jw=14,jh=28;
  const pg=ctx.createLinearGradient(jx,jy,jx+jw,jy+jh);
  pg.addColorStop(0,'#b0b0b0');pg.addColorStop(.4,'#e8e8e8');pg.addColorStop(1,'#888');
  ctx.fillStyle=pg;ctx.strokeStyle='#555';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.roundRect(jx,jy,jw,jh,4);ctx.fill();ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.35)';
  ctx.beginPath();ctx.roundRect(jx+2,jy+3,jw*.35,jh*.55,2);ctx.fill();

  const nbx=jx+jw;
  const nozzY=[jy+jh*.28,jy+jh*.72];
  nozzY.forEach(ny=>{
    ctx.fillStyle='#777';ctx.strokeStyle='#444';ctx.lineWidth=1;
    ctx.beginPath();ctx.roundRect(nbx,ny-3,10,6,2);ctx.fill();ctx.stroke();
    ctx.fillStyle='#555';ctx.strokeStyle='#444';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(nbx+8,ny-3);ctx.lineTo(nbx+14,ny-5.5);ctx.lineTo(nbx+14,ny+5.5);ctx.lineTo(nbx+8,ny+3);ctx.closePath();ctx.fill();ctx.stroke();
  });

  // Flame scales linearly: 0 force → tiny pilot light, max force → huge blaze
  const fLen = 8  + effort*130;  // 8px … 138px
  const fW   = 2  + effort*30;   // 2px … 32px

  nozzY.forEach((ny,ni)=>{
    const bx=nbx+14;
    const flick=Math.sin(tick*.35+ni*2.1)*effort*5;
    const fw2=Math.cos(tick*.28+ni)*effort*3;

    const og=ctx.createLinearGradient(bx,ny,bx+fLen,ny+flick);
    og.addColorStop(0,'rgba(255,185,15,1)');
    og.addColorStop(.35,'rgba(255,85,5,.92)');
    og.addColorStop(.75,'rgba(255,45,0,.55)');
    og.addColorStop(1,'rgba(255,25,0,0)');
    ctx.fillStyle=og;ctx.shadowColor='#ff7700';ctx.shadowBlur=24*effort;
    ctx.beginPath();
    ctx.moveTo(bx,ny-fW-fw2);
    ctx.quadraticCurveTo(bx+fLen*.5,ny+flick-fW*.55,bx+fLen,ny+flick*.8);
    ctx.quadraticCurveTo(bx+fLen*.5,ny+flick+fW*.55,bx,ny+fW+fw2);
    ctx.closePath();ctx.fill();

    const cLen=fLen*.52,cW=fW*.38;
    const ig=ctx.createLinearGradient(bx,ny,bx+cLen,ny);
    ig.addColorStop(0,'rgba(255,255,255,1)');ig.addColorStop(.5,'rgba(255,248,130,.95)');ig.addColorStop(1,'rgba(255,195,25,0)');
    ctx.fillStyle=ig;ctx.shadowBlur=0;
    ctx.beginPath();
    ctx.moveTo(bx,ny-cW);
    ctx.quadraticCurveTo(bx+cLen*.6,ny+flick*.35,bx+cLen,ny+flick*.45);
    ctx.quadraticCurveTo(bx+cLen*.6,ny+flick*.55,bx,ny+cW);
    ctx.closePath();ctx.fill();
  });
  ctx.shadowBlur=0;ctx.restore();
}

function drawRope(x1,y1,x2,y2){
  const mx=(x1+x2)/2,my=(y1+y2)/2+10;
  ctx.save();ctx.strokeStyle='#c8a050';ctx.lineWidth=2.6;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.quadraticCurveTo(mx,my,x2,y2);ctx.stroke();ctx.restore();
}

function drawForces(v1x,v1y,v2x,v2y){
  const ox=crateX,oy=crateY;
  const p1=perp(v1x,v1y);
  arrow(ox,oy,ox+v1x,oy+v1y,'#ff6644',3.5,14);
  vecLabel('F\u2081',ox+v1x/2+p1.x*24,oy+v1y/2+p1.y*24-4,'#ff6644',17);
  if(showAstro2){
    const p2=perp(v2x,v2y);
    arrow(ox,oy,ox+v2x,oy+v2y,'#44aaff',3.5,14);
    vecLabel('F\u2082',ox+v2x/2-p2.x*24,oy+v2y/2-p2.y*24-4,'#44aaff',17);
  }
  if(showFtot){
    const rx=showAstro2?v1x+v2x:v1x,ry=showAstro2?v1y+v2y:v1y;
    const rtx=ox+rx,rty=oy+ry;
    if(showAstro2){
      ctx.save();
      ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(ox+v1x,oy+v1y);ctx.lineTo(rtx,rty);ctx.lineTo(ox+v2x,oy+v2y);ctx.closePath();
      ctx.fillStyle='rgba(200,255,80,.05)';ctx.fill();
      ctx.setLineDash([6,5]);ctx.strokeStyle='rgba(200,255,80,.28)';ctx.lineWidth=1.4;
      ctx.beginPath();ctx.moveTo(ox+v1x,oy+v1y);ctx.lineTo(rtx,rty);ctx.stroke();
      ctx.beginPath();ctx.moveTo(ox+v2x,oy+v2y);ctx.lineTo(rtx,rty);ctx.stroke();
      ctx.setLineDash([]);ctx.restore();
    }
    const pR=perp(rx,ry);
    arrow(ox,oy,rtx,rty,'#ccff44',5,17);
    vecLabel('F\u1D57\u1D52\u1D57',ox+rx/2+pR.x*30,oy+ry/2+pR.y*30-4,'#ccff44',18);
  }
  if(simRunning){
    const rx=showAstro2?v1x+v2x:v1x,ry=showAstro2?v1y+v2y:v1y;
    const rMag=Math.hypot(rx,ry)||1,aLen=rMag/mass*8;
    const pA=perp(rx,ry);
    const atx=ox+rx/rMag*aLen,aty=oy+ry/rMag*aLen;
    arrow(ox,oy,atx,aty,'#ff44cc',3.5,13);
    vecLabel('a',ox+rx/rMag*aLen/2+pA.x*22,oy+ry/rMag*aLen/2+pA.y*22-4,'#ff44cc',16);
  }
}

function drawDragHandles(v1x,v1y,v2x,v2y){
  if(simRunning)return;
  const ox=crateX,oy=crateY;
  const handles=[{tx:ox+v1x,ty:oy+v1y,col:'#ff6644'}];
  if(showAstro2)handles.push({tx:ox+v2x,ty:oy+v2y,col:'#44aaff'});
  handles.forEach(({tx,ty,col})=>{
    ctx.save();
    ctx.strokeStyle=col;ctx.lineWidth=2;ctx.shadowColor=col;ctx.shadowBlur=16;
    ctx.beginPath();ctx.arc(tx,ty,11,0,Math.PI*2);ctx.stroke();ctx.shadowBlur=0;
    ctx.fillStyle='rgba(13,10,8,.85)';ctx.strokeStyle=col;ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(tx,ty,7,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.fillStyle=col;ctx.beginPath();ctx.arc(tx,ty,3,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });
}

function updatePhysics(v1x,v1y,v2x,v2y){
  if(!simRunning)return;
  const rx=showAstro2?v1x+v2x:v1x,ry=showAstro2?v1y+v2y:v1y;
  crateVX+=rx/(mass*1600);crateVY+=ry/(mass*1600);
  crateX+=crateVX;crateY+=crateVY;
  trailPoints.push({x:crateX,y:crateY});
  if(trailPoints.length>400)trailPoints.shift();
  if(crateX<-150||crateX>W+150||crateY<-150||crateY>H+150)resetSim();
}

function loop(){
  tick++;
  ctx.clearRect(0,0,W,H);drawBg();drawTrail();
  const v1x=Math.cos(f1.ang)*f1.mag,v1y=Math.sin(f1.ang)*f1.mag;
  const v2x=Math.cos(f2.ang)*f2.mag,v2y=Math.sin(f2.ang)*f2.mag;
  const t1x=crateX+v1x,t1y=crateY+v1y,t2x=crateX+v2x,t2y=crateY+v2y;
  const eff1=f1.mag/480,eff2=f2.mag/480;
  const netX=showAstro2?v1x+v2x:v1x,netY=showAstro2?v1y+v2y:v1y;
  const lurch=simRunning?0:Math.sin(tick*.09)*(Math.hypot(netX,netY)/700)*1.3;
  drawCrate(lurch);
  const ca1x=crateX+Math.cos(f1.ang)*CW*.48,ca1y=crateY+Math.sin(f1.ang)*CH*.48;
  drawRope(t1x,t1y,ca1x,ca1y);
  drawMan(t1x,t1y,f1.ang+Math.PI,eff1,'#d8d8d8',tick);
  if(showAstro2){
    const ca2x=crateX+Math.cos(f2.ang)*CW*.48,ca2y=crateY+Math.sin(f2.ang)*CH*.48;
    drawRope(t2x,t2y,ca2x,ca2y);
    drawMan(t2x,t2y,f2.ang+Math.PI,eff2,'#e0e0e0',tick+40);
  }
  drawDragHandles(v1x,v1y,v2x,v2y);
  if(showForces)drawForces(v1x,v1y,v2x,v2y);
  updateReadouts(v1x,v1y,v2x,v2y);
  updatePhysics(v1x,v1y,v2x,v2y);
  requestAnimationFrame(loop);
}

pushSlidersF1();pushSlidersF2();
document.getElementById('rdMass').textContent=mass.toFixed(1);
loop();
</script>
