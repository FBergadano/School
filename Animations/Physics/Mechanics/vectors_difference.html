<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D⃗ = A⃗ − B⃗ — Differenza di Vettori</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg: #0d0f14;
  --surface: #13161d;
  --surface2: #1a1e28;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #e4e8f0;
  --muted: #606880;
  --ca: #f97316;
  --cb: #3b82f6;
  --cnb: #a855f7;   /* −B⃗ = opposite of B → purple */
  --cd: #22c55e;    /* result D⃗ */
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body { background:var(--bg); color:var(--text); font-family:'Outfit',sans-serif; }

.app {
  display:grid;
  grid-template-rows: 52px 1fr;
  grid-template-columns: 1fr 330px;
  height:100vh;
}

/* ── HEADER ── */
header {
  grid-column:1/-1;
  display:flex; align-items:center; gap:16px;
  padding:0 24px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
}
header h1 { font-size:0.98rem; font-weight:700; letter-spacing:-0.3px; white-space:nowrap; }
header h1 .eq { color:var(--cd); font-weight:800; }
header h1 .neg { color:var(--cnb); }

.method-tabs { display:flex; gap:4px; }
.mode-tabs   { display:flex; gap:4px; margin-left:auto; }
.tab {
  padding:5px 13px; border-radius:6px;
  font-size:0.76rem; font-weight:600; cursor:pointer;
  border:1px solid var(--border2); background:transparent; color:var(--muted);
  transition:all 0.18s;
}
.tab:hover { color:var(--text); }
.tab.active { background:var(--text); color:var(--bg); border-color:var(--text); }
.sep { width:1px; background:var(--border2); height:24px; align-self:center; }

/* ── CANVAS ── */
.canvas-area { position:relative; background:var(--bg); overflow:hidden; }
canvas { display:block; }

#stepBar {
  position:absolute; bottom:0; left:0; right:0;
  display:none; background:var(--surface); border-top:1px solid var(--border);
}
.step-btn {
  flex:1; padding:9px 10px; border:none; border-right:1px solid var(--border);
  background:transparent; color:var(--muted);
  font-family:'Outfit',sans-serif; font-size:0.72rem; font-weight:500;
  cursor:pointer; transition:all 0.18s; text-align:left;
  display:flex; align-items:center; gap:7px;
}
.step-btn:last-child { border-right:none; }
.step-btn:hover { background:var(--surface2); color:var(--text); }
.step-btn.active { background:var(--surface2); color:var(--text); }
.step-btn.done { color:var(--cd); }
.step-dot {
  width:17px; height:17px; border-radius:50%;
  border:1.5px solid currentColor;
  display:flex; align-items:center; justify-content:center;
  font-size:0.62rem; font-weight:700; flex-shrink:0;
}
.step-btn.active .step-dot { background:var(--text); color:var(--bg); border-color:var(--text); }
.step-btn.done   .step-dot { background:var(--cd); color:var(--bg); border-color:var(--cd); }

/* ── PANEL ── */
.panel {
  background:var(--surface); border-left:1px solid var(--border);
  display:flex; flex-direction:column; overflow-y:auto;
  scrollbar-width:thin; scrollbar-color:var(--border2) transparent;
}
.panel::-webkit-scrollbar { width:4px; }
.panel::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

.p-section { padding:14px 16px; border-bottom:1px solid var(--border); flex-shrink:0; }
.p-title {
  font-family:'JetBrains Mono',monospace; font-size:0.56rem;
  letter-spacing:3px; text-transform:uppercase; color:var(--muted); margin-bottom:10px;
}

.ctrl-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.ctrl-row:last-child { margin-bottom:0; }
.ctrl-row label { font-family:'JetBrains Mono',monospace; font-size:0.62rem; color:var(--muted); width:58px; flex-shrink:0; }
.ctrl-row input[type=range] { flex:1; height:3px; appearance:none; background:var(--border2); border-radius:2px; cursor:pointer; outline:none; }
.ctrl-row input[type=range]::-webkit-slider-thumb { appearance:none; width:13px; height:13px; border-radius:50%; background:var(--text); cursor:pointer; }
.ctrl-val { font-family:'JetBrains Mono',monospace; font-size:0.68rem; color:var(--text); width:38px; text-align:right; flex-shrink:0; }

.verso-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.verso-row label { font-family:'JetBrains Mono',monospace; font-size:0.62rem; color:var(--muted); width:58px; flex-shrink:0; }
.verso-btns { display:flex; gap:4px; flex:1; }
.verso-btn { flex:1; padding:4px 5px; border:1px solid var(--border2); background:transparent; color:var(--muted); font-family:'JetBrains Mono',monospace; font-size:0.6rem; border-radius:4px; cursor:pointer; transition:all 0.15s; text-align:center; }
.verso-btn:hover { color:var(--text); }
.verso-btn.active { background:var(--text); color:var(--bg); border-color:var(--text); }

.result-card { background:rgba(34,197,94,0.07); border:1px solid rgba(34,197,94,0.2); border-radius:8px; padding:11px 13px; }
.r-eq { font-size:0.86rem; font-weight:700; color:var(--cd); margin-bottom:7px; }
.r-row { display:flex; justify-content:space-between; padding:3px 0; border-bottom:1px solid rgba(34,197,94,0.1); font-size:0.74rem; }
.r-row:last-child { border-bottom:none; }
.r-row .rk { color:var(--muted); }
.r-row .rv { font-family:'JetBrains Mono',monospace; color:var(--cd); }

.key-idea {
  background:rgba(168,85,247,0.07); border:1px solid rgba(168,85,247,0.2);
  border-radius:8px; padding:11px 13px; font-size:0.77rem; line-height:1.6; color:var(--text);
  margin-bottom:10px;
}
.key-idea .kw { color:var(--cnb); font-weight:700; }

.anim-controls { display:flex; gap:7px; align-items:center; margin-bottom:9px; }
.btn { padding:6px 13px; border-radius:6px; font-family:'Outfit',sans-serif; font-size:0.76rem; font-weight:600; cursor:pointer; transition:all 0.15s; border:1px solid var(--border2); background:transparent; color:var(--text); }
.btn:hover { background:var(--surface2); }
.btn.primary { background:var(--text); color:var(--bg); border-color:var(--text); }
.btn.primary:hover { background:#c8d0e0; }
.btn.success { border-color:rgba(34,197,94,0.4); color:var(--cd); }
.btn.success:hover { background:rgba(34,197,94,0.07); }

.prog-wrap { flex:1; height:3px; background:var(--border2); border-radius:2px; }
.prog-bar  { height:100%; background:var(--text); border-radius:2px; transition:width 0.08s linear; }

.feedback-box { border-radius:8px; padding:11px 13px; font-size:0.78rem; line-height:1.6; font-weight:500; margin-bottom:9px; min-height:46px; }
.feedback-box.idle    { background:var(--surface2); border:1px solid var(--border); color:var(--muted); }
.feedback-box.correct { background:rgba(34,197,94,0.07); border:1px solid rgba(34,197,94,0.25); color:var(--cd); }
.feedback-box.wrong   { background:rgba(239,68,68,0.07); border:1px solid rgba(239,68,68,0.22); color:#f87171; }

.instr-box { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:11px 13px; font-size:0.76rem; line-height:1.65; color:var(--muted); margin-bottom:9px; }
.instr-box strong { color:var(--text); }
.sl { display:inline-block; background:var(--border2); border-radius:3px; padding:0 5px; font-family:'JetBrains Mono',monospace; font-size:0.68rem; margin-right:3px; }

.notch-row { display:flex; align-items:center; gap:9px; padding:4px 0; border-bottom:1px solid var(--border); font-size:0.76rem; }
.notch-row:last-child { border-bottom:none; }
.notch-line { width:22px; height:3px; border-radius:2px; flex-shrink:0; }
.notch-dash { width:22px; height:3px; flex-shrink:0; background:repeating-linear-gradient(90deg,rgba(255,255,255,0.4) 0,rgba(255,255,255,0.4) 4px,transparent 4px,transparent 8px); }
</style>
</head>
<body>
<div class="app">

  <header>
    <h1>D&#x20D7; <span class="eq">=</span> A&#x20D7; <span class="eq">−</span> B&#x20D7; &nbsp;=&nbsp; A&#x20D7; + <span class="neg">(−B&#x20D7;)</span></h1>
    <div class="method-tabs">
      <button class="tab active" id="mthPunta" onclick="setMethod('punta')">Punta-Coda</button>
      <button class="tab" id="mthPara" onclick="setMethod('para')">Parallelogramma</button>
    </div>
    <div class="sep"></div>
    <div class="mode-tabs">
      <button class="tab active" id="tabAnim" onclick="setMode('anim')">▶ Animazione</button>
      <button class="tab" id="tabFree" onclick="setMode('free')">✏ Esplora</button>
      <button class="tab" id="tabQuiz" onclick="setMode('quiz')">🎯 Quiz</button>
    </div>
  </header>

  <div class="canvas-area" id="canvasArea">
    <canvas id="c"></canvas>
    <div id="stepBar"></div>
  </div>

  <div class="panel" id="panel"></div>
</div>

<script>
// ═══════════════════════════════════════════
// CANVAS
// ═══════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, CX, CY, SCALE, DPR = window.devicePixelRatio||1;

let METHOD = 'punta'; // 'punta' | 'para'
let MODE   = 'anim';  // 'anim'  | 'free' | 'quiz'

function resize() {
  const area = document.getElementById('canvasArea');
  const r = area.getBoundingClientRect();
  const barH = (MODE==='anim') ? 44 : 0;
  const dw=r.width, dh=r.height-barH;
  canvas.width=dw*DPR; canvas.height=dh*DPR;
  canvas.style.width=dw+'px'; canvas.style.height=dh+'px';
  ctx.resetTransform(); ctx.scale(DPR,DPR);
  W=dw; H=dh; CX=W*0.42; CY=H*0.52;
  SCALE=Math.min(W,H)/14;
  drawScene();
}
window.addEventListener('resize',()=>setTimeout(resize,40));

// ═══════════════════════════════════════════
// VECTOR STATE
// ═══════════════════════════════════════════
const vecs = {
  A:  {mod:3, dir:30,  verso:1},
  B:  {mod:3, dir:80,  verso:1},
  QA: {mod:3, dir:30,  verso:1},
  QB: {mod:3, dir:80,  verso:1},
};

function getAngle(v){ return v.verso>0 ? v.dir : v.dir+180; }
function comp(v){
  const r=getAngle(v)*Math.PI/180;
  return {x:v.mod*Math.cos(r), y:v.mod*Math.sin(r)};
}
// −B
function compNeg(v){
  const c=comp(v); return {x:-c.x, y:-c.y};
}
function toC(gx,gy){ return {x:CX+gx*SCALE, y:CY-gy*SCALE}; }
function toG(cx,cy){ return {x:(cx-CX)/SCALE, y:-(cy-CY)/SCALE}; }

// ═══════════════════════════════════════════
// DRAW PRIMITIVES
// ═══════════════════════════════════════════
function drawGrid(){
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle='rgba(255,255,255,0.05)'; ctx.lineWidth=0.7;
  for(let i=-18;i<=18;i++){
    const px=CX+i*SCALE,py=CY+i*SCALE;
    ctx.beginPath();ctx.moveTo(px,0);ctx.lineTo(px,H);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,py);ctx.lineTo(W,py);ctx.stroke();
  }
  ctx.strokeStyle='rgba(255,255,255,0.18)'; ctx.lineWidth=1.2;
  ctx.beginPath();ctx.moveTo(0,CY);ctx.lineTo(W,CY);ctx.stroke();
  ctx.beginPath();ctx.moveTo(CX,0);ctx.lineTo(CX,H);ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.18)';
  ctx.font='8px JetBrains Mono,monospace';
  ctx.textAlign='center';ctx.textBaseline='top';
  for(let i=-7;i<=7;i++){if(!i)continue;ctx.fillText(i,CX+i*SCALE,CY+4);}
  ctx.textAlign='right';ctx.textBaseline='middle';
  for(let i=-5;i<=5;i++){if(!i)continue;ctx.fillText(i,CX-5,CY-i*SCALE);}
  ctx.fillStyle='rgba(255,255,255,0.25)';
  ctx.font='bold 10px JetBrains Mono,monospace';
  ctx.textAlign='left'; ctx.fillText('x →',W-28,CY-16);
  ctx.textAlign='center'; ctx.fillText('↑ y',CX+12,8);
}

function arrow(ox,oy,ex,ey,color,alpha,lw,label,labelSide){
  if(alpha<=0.01)return;
  const dx=ex-ox,dy=ey-oy,len=Math.sqrt(dx*dx+dy*dy);
  if(len<2)return;
  const ang=Math.atan2(dy,dx),HL=Math.min(14,len*0.45);
  ctx.save();ctx.globalAlpha=alpha;
  ctx.strokeStyle=color;ctx.fillStyle=color;
  ctx.lineWidth=lw;ctx.lineCap='round';
  ctx.shadowBlur=16;ctx.shadowColor=color;
  ctx.beginPath();ctx.moveTo(ox,oy);
  ctx.lineTo(ex-HL*0.7*Math.cos(ang),ey-HL*0.7*Math.sin(ang));ctx.stroke();
  ctx.shadowBlur=10;
  ctx.beginPath();ctx.moveTo(ex,ey);
  ctx.lineTo(ex-HL*Math.cos(ang-0.44),ey-HL*Math.sin(ang-0.44));
  ctx.lineTo(ex-HL*Math.cos(ang+0.44),ey-HL*Math.sin(ang+0.44));
  ctx.closePath();ctx.fill();
  ctx.restore();
  if(label&&alpha>0.25){
    const side=labelSide!==undefined?labelSide:1;
    const px=Math.sin(ang),py=-Math.cos(ang);
    // Name near the tip (85% along shaft), perp offset +side
    const lx=ox+(ex-ox)*0.85+px*22*side, ly=oy+(ey-oy)*0.85+py*22*side;
    ctx.save();ctx.globalAlpha=alpha;ctx.shadowBlur=8;ctx.shadowColor=color;ctx.fillStyle=color;
    ctx.textAlign='center';ctx.textBaseline='alphabetic';
    ctx.font='bold 15px Outfit,sans-serif';ctx.fillText(label,lx,ly+3);
    ctx.font='bold 9px Outfit,sans-serif';ctx.fillText('→',lx+1,ly-10);
    ctx.restore();
  }
}

function dashedArrow(ox,oy,ex,ey,color,alpha){
  if(alpha<=0.01)return;
  const dx=ex-ox,dy=ey-oy,len=Math.sqrt(dx*dx+dy*dy);
  if(len<2)return;
  const ang=Math.atan2(dy,dx),HL=10;
  ctx.save();ctx.globalAlpha=alpha;
  ctx.strokeStyle=color;ctx.lineWidth=1.8;ctx.setLineDash([5,5]);
  ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(ex,ey);ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle=color;
  ctx.beginPath();ctx.moveTo(ex,ey);
  ctx.lineTo(ex-HL*Math.cos(ang-0.44),ey-HL*Math.sin(ang-0.44));
  ctx.lineTo(ex-HL*Math.cos(ang+0.44),ey-HL*Math.sin(ang+0.44));
  ctx.closePath();ctx.fill();
  ctx.restore();
}

function dot(cx,cy,color,r,alpha){
  ctx.save();ctx.globalAlpha=alpha;ctx.fillStyle=color;
  ctx.shadowBlur=14;ctx.shadowColor=color;
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function modLabel(ox,oy,ex,ey,text,color,alpha,side){
  if(alpha===undefined)alpha=1;
  if(alpha<0.3)return;
  const ang=Math.atan2(ey-oy,ex-ox);
  const s=side!==undefined?side:1;
  // Place modulo at 35% along shaft, on side -s (opposite from name label)
  const mx=(ox+ex)/2+Math.sin(ang)*22*(-s), my=(oy+ey)/2-Math.cos(ang)*22*(-s);
  ctx.save();ctx.globalAlpha=alpha*0.9;ctx.fillStyle=color;
  ctx.font='500 11px JetBrains Mono,monospace';
  ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(text,mx,my);
  ctx.restore();
}

function parallelogramShape(O,p1,p2,vertex,alpha,fillAlpha){
  if(alpha<=0.01)return;
  ctx.save();ctx.globalAlpha=alpha;
  ctx.fillStyle=`rgba(255,255,255,${fillAlpha||0.04})`;
  ctx.strokeStyle='rgba(255,255,255,0.18)';ctx.lineWidth=1.2;ctx.setLineDash([5,5]);
  ctx.beginPath();
  ctx.moveTo(O.x,O.y);ctx.lineTo(p1.x,p1.y);
  ctx.lineTo(vertex.x,vertex.y);ctx.lineTo(p2.x,p2.y);
  ctx.closePath();ctx.fill();ctx.stroke();
  ctx.setLineDash([]);ctx.restore();
}

function resultHTML(vA,vB){
  const a=comp(vA),b=comp(vB);
  const dx=a.x-b.x, dy=a.y-b.y;
  const mod=Math.sqrt(dx*dx+dy*dy);
  const ang=((Math.atan2(dy,dx)*180/Math.PI)+360)%360;
  return `<div class="r-eq">D&#x20D7; = A&#x20D7; − B&#x20D7;</div>
    <div class="r-row"><span class="rk">|D&#x20D7;|</span><span class="rv">${mod.toFixed(2)} cm</span></div>
    <div class="r-row"><span class="rk">Angolo</span><span class="rv">${ang.toFixed(1)}°</span></div>
    <div class="r-row"><span class="rk">Dx</span><span class="rv">${dx.toFixed(2)} cm</span></div>
    <div class="r-row"><span class="rk">Dy</span><span class="rv">${dy.toFixed(2)} cm</span></div>`;
}

// ═══════════════════════════════════════════
// ANIMATION STATE
// ═══════════════════════════════════════════
const ANIM={step:0,t:0,playing:false,raf:null,lastTs:null};
const STEP_DUR=2200;

const EXPLAINS_PUNTA=[
  'Passo 1 — A&#x20D7; parte dall\'origine. Ricorda l\'idea chiave: <strong style="color:#a855f7">A&#x20D7; − B&#x20D7; = A&#x20D7; + (−B&#x20D7;)</strong>. Il primo passo è disegnare A&#x20D7;.',
  'Passo 2 — Si inverte B&#x20D7; per ottenere <span style="color:#a855f7">−B&#x20D7;</span>: stesso modulo e direzione, <strong>verso opposto</strong>. Poi si trasla −B&#x20D7; con la coda sulla punta di A&#x20D7; (metodo punta-coda).',
  'Passo 3 — La risultante D&#x20D7; = A&#x20D7; + (−B&#x20D7;) va dall\'origine alla punta di −B&#x20D7; traslato.',
];
const EXPLAINS_PARA=[
  'Passo 1 — Si disegnano A&#x20D7; e <span style="color:#a855f7">−B&#x20D7;</span> dall\'origine. −B&#x20D7; è B&#x20D7; con il verso invertito.',
  'Passo 2 — Si completano i lati del parallelogramma costruito su A&#x20D7; e −B&#x20D7;.',
  'Passo 3 — <span style="color:#22c55e">D&#x20D7;</span> = A&#x20D7; + (−B&#x20D7;) è la diagonale principale del parallelogramma, che parte dall\'origine O.',
];

// ═══════════════════════════════════════════
// DRAW FUNCTIONS — PUNTA-CODA
// ═══════════════════════════════════════════
function drawPunta_anim(){
  drawGrid();
  const vA=vecs.A,vB=vecs.B;
  const a=comp(vA),nb=compNeg(vB); // −B
  const O=toC(0,0);
  const tipA=toC(a.x,a.y);
  const tipNB_orig=toC(nb.x,nb.y); // −B from origin (ghost position)
  const tipD=toC(a.x+nb.x,a.y+nb.y); // = A−B
  const e=1-Math.pow(1-Math.min(1,ANIM.t),3);
  const isIdle=(ANIM.step===0&&ANIM.t===0&&!ANIM.playing);

  if(isIdle){
    // Show A and B (original) before animation
    arrow(O.x,O.y,tipA.x,tipA.y,'#f97316',1,3,'A');
    modLabel(O.x,O.y,tipA.x,tipA.y,vA.mod+'cm','#f97316',1);
    arrow(O.x,O.y,toC(comp(vB).x,comp(vB).y).x,toC(comp(vB).x,comp(vB).y).y,'#3b82f6',1,3,'B');
    modLabel(O.x,O.y,toC(comp(vB).x,comp(vB).y).x,toC(comp(vB).x,comp(vB).y).y,vB.mod+'cm','#3b82f6',1);
    dot(O.x,O.y,'#ffffff',4,0.5);

  } else if(ANIM.step===0){
    // A grows, B visible dimly
    const tipBorig=toC(comp(vB).x,comp(vB).y);
    arrow(O.x,O.y,tipBorig.x,tipBorig.y,'#3b82f6',0.35,2,'B');
    const cur={x:O.x+(tipA.x-O.x)*e,y:O.y+(tipA.y-O.y)*e};
    arrow(O.x,O.y,cur.x,cur.y,'#f97316',1,3,e>0.5?'A':'');
    modLabel(O.x,O.y,cur.x,cur.y,vA.mod+'cm','#f97316',e);
    dot(O.x,O.y,'#ffffff',4,0.5);

  } else if(ANIM.step===1){
    // A fully drawn; B visible; −B appears (first at origin, then translates)
    arrow(O.x,O.y,tipA.x,tipA.y,'#f97316',1,3,'A');
    modLabel(O.x,O.y,tipA.x,tipA.y,vA.mod+'cm','#f97316',1);

    // Original B (ghost, fading as −B appears)
    const tipBorig=toC(comp(vB).x,comp(vB).y);
    dashedArrow(O.x,O.y,tipBorig.x,tipBorig.y,'#3b82f6',0.3*(1-e*0.5));

    // Phase 1 (e 0→0.5): −B appears at origin (grows from 0 to full)
    // Phase 2 (e 0.5→1): −B translates from origin to tip of A
    const phase1=Math.min(1,e*2);
    const phase2=Math.max(0,(e-0.5)*2);

    const nbGrowTip={x:O.x+tipNB_orig.x*phase1-O.x+O.x,y:O.y+tipNB_orig.y*phase1-O.y+O.y};
    // actually:
    const nbTipAtOrigin={x:O.x+(tipNB_orig.x-O.x)*phase1,y:O.y+(tipNB_orig.y-O.y)*phase1};

    // Tail of −B slides from O to tipA
    const tailNBx=O.x+(tipA.x-O.x)*phase2;
    const tailNBy=O.y+(tipA.y-O.y)*phase2;
    const tipNBx =nbTipAtOrigin.x+(tipD.x-nbTipAtOrigin.x)*phase2;
    const tipNBy =nbTipAtOrigin.y+(tipD.y-nbTipAtOrigin.y)*phase2;

    arrow(tailNBx,tailNBy,tipNBx,tipNBy,'#a855f7',1,3,phase1>0.5?'−B':'');
    modLabel(tailNBx,tailNBy,tipNBx,tipNBy,vB.mod+'cm','#a855f7',phase1);
    dot(O.x,O.y,'#ffffff',4,0.5);

    if(phase2>0.85) dot(tipA.x,tipA.y,'#a855f7',5,(phase2-0.85)/0.15*0.7);

  } else { // step 2
    arrow(O.x,O.y,tipA.x,tipA.y,'#f97316',1,3,'A');
    modLabel(O.x,O.y,tipA.x,tipA.y,vA.mod+'cm','#f97316',1);
    const tipBorig=toC(comp(vB).x,comp(vB).y);
    dashedArrow(O.x,O.y,tipBorig.x,tipBorig.y,'#3b82f6',0.2);
    // −B translated, full
    arrow(tipA.x,tipA.y,tipD.x,tipD.y,'#a855f7',1,3,'−B');
    modLabel(tipA.x,tipA.y,tipD.x,tipD.y,vB.mod+'cm','#a855f7',1);
    dot(O.x,O.y,'#ffffff',4,0.5);

    // D growing
    const curD={x:O.x+(tipD.x-O.x)*e,y:O.y+(tipD.y-O.y)*e};
    arrow(O.x,O.y,curD.x,curD.y,'#22c55e',1,3.5,e>0.5?'D':'');
    const dm=Math.hypot(a.x+nb.x,a.y+nb.y);
    modLabel(O.x,O.y,curD.x,curD.y,dm.toFixed(1)+'cm','#22c55e',e);
  }

  document.getElementById('animResult').innerHTML=resultHTML(vA,vB);
}

// ═══════════════════════════════════════════
// DRAW FUNCTIONS — PARALLELOGRAMMA
// ═══════════════════════════════════════════
// Metodo corretto: A⃗ − B⃗ col parallelogramma su A⃗ e −B⃗
//   Passo 1: disegna A⃗ e −B⃗ dall'origine
//   Passo 2: completa il parallelogramma (vertice V2 = A + (−B) = A − B)
//   Passo 3: D⃗ è la diagonale principale del parallelogramma (O → V2)

function _paraVecs(vA,vB){
  const a=comp(vA), nb=compNeg(vB);
  const O=toC(0,0);
  const tipA=toC(a.x,a.y);
  const tipNB=toC(nb.x,nb.y);          // punta di −B dall'origine
  const V2=toC(a.x+nb.x,a.y+nb.y);     // = toC(ax-bx, ay-by) = tipD
  return {a,nb,O,tipA,tipNB,V2};
}

function drawPara_anim(){
  drawGrid();
  const vA=vecs.A,vB=vecs.B;
  const {a,nb,O,tipA,tipNB,V2}=_paraVecs(vA,vB);
  const e=1-Math.pow(1-Math.min(1,ANIM.t),3);
  const isIdle=(ANIM.step===0&&ANIM.t===0&&!ANIM.playing);

  if(isIdle){
    // Mostra A e B originale prima di iniziare
    arrow(O.x,O.y,tipA.x,tipA.y,'#f97316',1,3,'A');
    modLabel(O.x,O.y,tipA.x,tipA.y,vA.mod+'cm','#f97316');
    const tipB=toC(comp(vB).x,comp(vB).y);
    arrow(O.x,O.y,tipB.x,tipB.y,'#3b82f6',1,3,'B');
    modLabel(O.x,O.y,tipB.x,tipB.y,vB.mod+'cm','#3b82f6');
    dot(O.x,O.y,'#ffffff',4,0.5);

  } else if(ANIM.step===0){
    // A cresce; −B cresce (viola) — B originale sbiadito
    const tipB=toC(comp(vB).x,comp(vB).y);
    arrow(O.x,O.y,tipB.x,tipB.y,'#3b82f6',0.25,1.5,'B');
    const cA={x:O.x+(tipA.x-O.x)*e,y:O.y+(tipA.y-O.y)*e};
    const cNB={x:O.x+(tipNB.x-O.x)*e,y:O.y+(tipNB.y-O.y)*e};
    arrow(O.x,O.y,cA.x,cA.y,'#f97316',1,3,e>0.5?'A':'');
    modLabel(O.x,O.y,cA.x,cA.y,vA.mod+'cm','#f97316',e);
    arrow(O.x,O.y,cNB.x,cNB.y,'#a855f7',1,3,e>0.5?'-B':'');
    modLabel(O.x,O.y,cNB.x,cNB.y,vB.mod+'cm','#a855f7',e);
    dot(O.x,O.y,'#ffffff',4,0.5);

  } else if(ANIM.step===1){
    // A e −B completi; parallelogramma cresce
    const tipB=toC(comp(vB).x,comp(vB).y);
    arrow(O.x,O.y,tipB.x,tipB.y,'#3b82f6',0.25,1.5,'B');
    arrow(O.x,O.y,tipA.x,tipA.y,'#f97316',1,3,'A');
    modLabel(O.x,O.y,tipA.x,tipA.y,vA.mod+'cm','#f97316');
    arrow(O.x,O.y,tipNB.x,tipNB.y,'#a855f7',1,3,'-B');
    modLabel(O.x,O.y,tipNB.x,tipNB.y,vB.mod+'cm','#a855f7');
    dot(O.x,O.y,'#ffffff',4,0.5);

    // lati del parallelogramma crescono verso V2
    const sA={x:tipA.x+(V2.x-tipA.x)*e, y:tipA.y+(V2.y-tipA.y)*e};
    const sNB={x:tipNB.x+(V2.x-tipNB.x)*e, y:tipNB.y+(V2.y-tipNB.y)*e};
    ctx.save();ctx.globalAlpha=e*0.5;
    ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=1.2;ctx.setLineDash([5,5]);
    ctx.beginPath();ctx.moveTo(O.x,O.y);ctx.lineTo(tipA.x,tipA.y);ctx.lineTo(sA.x,sA.y);ctx.lineTo(sNB.x,sNB.y);ctx.lineTo(tipNB.x,tipNB.y);ctx.closePath();
    ctx.fillStyle='rgba(255,255,255,0.03)';ctx.fill();ctx.stroke();
    ctx.setLineDash([]);ctx.restore();
    ctx.save();ctx.globalAlpha=e*0.4;
    ctx.strokeStyle='#a855f7';ctx.lineWidth=1.3;ctx.setLineDash([4,5]);
    ctx.beginPath();ctx.moveTo(tipA.x,tipA.y);ctx.lineTo(sA.x,sA.y);ctx.stroke();
    ctx.strokeStyle='#f97316';
    ctx.beginPath();ctx.moveTo(tipNB.x,tipNB.y);ctx.lineTo(sNB.x,sNB.y);ctx.stroke();
    ctx.setLineDash([]);ctx.restore();
    if(e>0.85) dot(sA.x,sA.y,'#ffffff',4,(e-0.85)/0.15*0.7);

  } else { // step 2 — D grows as diagonal from O to V2
    const tipB=toC(comp(vB).x,comp(vB).y);
    arrow(O.x,O.y,tipB.x,tipB.y,'#3b82f6',0.25,1.5,'B');
    parallelogramShape(O,tipA,tipNB,V2,1);
    ctx.save();ctx.globalAlpha=0.35;
    ctx.strokeStyle='#a855f7';ctx.lineWidth=1.3;ctx.setLineDash([4,5]);
    ctx.beginPath();ctx.moveTo(tipA.x,tipA.y);ctx.lineTo(V2.x,V2.y);ctx.stroke();
    ctx.strokeStyle='#f97316';
    ctx.beginPath();ctx.moveTo(tipNB.x,tipNB.y);ctx.lineTo(V2.x,V2.y);ctx.stroke();
    ctx.setLineDash([]);ctx.restore();

    arrow(O.x,O.y,tipA.x,tipA.y,'#f97316',1,3,'A');
    modLabel(O.x,O.y,tipA.x,tipA.y,vA.mod+'cm','#f97316');
    arrow(O.x,O.y,tipNB.x,tipNB.y,'#a855f7',1,3,'-B');
    modLabel(O.x,O.y,tipNB.x,tipNB.y,vB.mod+'cm','#a855f7');

    const curDx=O.x+(V2.x-O.x)*e, curDy=O.y+(V2.y-O.y)*e;
    arrow(O.x,O.y,curDx,curDy,'#22c55e',1,3.5,e>0.5?'D':'');
    const dm=Math.hypot(a.x+nb.x,a.y+nb.y);
    modLabel(O.x,O.y,curDx,curDy,dm.toFixed(1)+'cm','#22c55e',e);

    dot(V2.x,V2.y,'#ffffff',4,0.5);
    dot(O.x,O.y,'#ffffff',4,0.5);
  }

  document.getElementById('animResult').innerHTML=resultHTML(vA,vB);
}

function drawPara_free(){
  drawGrid();
  const vA=vecs.A,vB=vecs.B;
  const {a,nb,O,tipA,tipNB,V2}=_paraVecs(vA,vB);
  const tipB=toC(comp(vB).x,comp(vB).y);

  // B originale sbiadito per riferimento
  arrow(O.x,O.y,tipB.x,tipB.y,'#3b82f6',0.25,1.5,'B');

  // Parallelogramma su A e −B
  parallelogramShape(O,tipA,tipNB,V2,1);
  ctx.save();ctx.globalAlpha=0.35;
  ctx.strokeStyle='#a855f7';ctx.lineWidth=1.3;ctx.setLineDash([4,5]);
  ctx.beginPath();ctx.moveTo(tipA.x,tipA.y);ctx.lineTo(V2.x,V2.y);ctx.stroke();
  ctx.strokeStyle='#f97316';
  ctx.beginPath();ctx.moveTo(tipNB.x,tipNB.y);ctx.lineTo(V2.x,V2.y);ctx.stroke();
  ctx.setLineDash([]);ctx.restore();

  arrow(O.x,O.y,tipA.x,tipA.y,'#f97316',1,3,'A');
  modLabel(O.x,O.y,tipA.x,tipA.y,vA.mod+'cm','#f97316');
  arrow(O.x,O.y,tipNB.x,tipNB.y,'#a855f7',1,3,'-B');
  modLabel(O.x,O.y,tipNB.x,tipNB.y,vB.mod+'cm','#a855f7');

  // D = diagonale principale
  arrow(O.x,O.y,V2.x,V2.y,'#22c55e',1,3.5,'D');
  const dm=Math.hypot(a.x+nb.x,a.y+nb.y);
  modLabel(O.x,O.y,V2.x,V2.y,dm.toFixed(1)+'cm','#22c55e');

  dot(V2.x,V2.y,'#ffffff',4,0.5);
  dot(O.x,O.y,'#ffffff',4,0.5);
  document.getElementById('freeResult').innerHTML=resultHTML(vA,vB);
}

// ═══════════════════════════════════════════
// QUIZ STATE
// ═══════════════════════════════════════════
// Punta-coda quiz — 3 interazioni:
//   1) Q.tipB_user: punta di B draggable (l'utente deve portarla al posto di −B, cioè coords nb)
//   2) Q.tailNB:    coda di −B draggable (deve finire su tipA)
//   3) Q.tipD_pt:   punta di D draggable
// Para quiz:
//   Q.tipD_para: punta della seconda diagonale (deve finire su tipA)
const Q={
  tipB_user:{x:0,y:0},   // punta di B (user drags tip to invert it)
  tailNB:{x:0,y:0},       // coda di −B traslato
  tipD_pt:{x:0,y:0},      // punta di D
  tipD_para:{x:0,y:0},
  dragging:null,
  checked:false, showingCorr:false,
};

function _resetQPos(){
  const b=comp(vecs.QB);
  // B starts at origin with original tip
  Q.tipB_user={x:b.x, y:b.y};
  // −B tail starts at origin
  Q.tailNB={x:0,y:0};
  Q.tipD_pt={x:0,y:0};
  Q.tipD_para={x:0,y:0};
}

function initQuiz(){
  quizVecUpdate();
  _resetQPos();
  Q.checked=false; Q.showingCorr=false; Q.dragging=null;
  const fb=document.getElementById('quizFeedback');
  if(METHOD==='punta'){
    fb.textContent='Passo 1: trascina la punta di B\u20d7 (pallino blu) nel punto opposto per ottenere −B\u20d7.';
  } else {
    fb.textContent='Passo 1: trascina la punta di B\u20d7 (pallino blu) nel punto opposto per ottenere −B\u20d7. Poi trascina D\u20d7 sulla diagonale del parallelogramma.';
  }
  fb.className='feedback-box idle';
  document.getElementById('btnCheck').style.display='none';
  document.getElementById('btnShowCorr').style.display='none';
  drawQuiz();
}

function newQuiz(){
  const dirs=[0,30,45,60,90,120,135,150,180];
  vecs.QA={mod:2+Math.floor(Math.random()*4),dir:dirs[Math.floor(Math.random()*dirs.length)],verso:Math.random()<0.5?1:-1};
  vecs.QB={mod:2+Math.floor(Math.random()*4),dir:dirs[Math.floor(Math.random()*dirs.length)],verso:Math.random()<0.5?1:-1};
  document.getElementById('qAmod').value=vecs.QA.mod; document.getElementById('qAmodV').textContent=vecs.QA.mod+' cm';
  document.getElementById('qAdir').value=vecs.QA.dir; document.getElementById('qAdirV').textContent=vecs.QA.dir+'°';
  document.getElementById('qBmod').value=vecs.QB.mod; document.getElementById('qBmodV').textContent=vecs.QB.mod+' cm';
  document.getElementById('qBdir').value=vecs.QB.dir; document.getElementById('qBdirV').textContent=vecs.QB.dir+'°';
  initQuiz();
}

function quizVecUpdate(){
  vecs.QA.mod=+document.getElementById('qAmod').value; document.getElementById('qAmodV').textContent=vecs.QA.mod+' cm';
  vecs.QA.dir=+document.getElementById('qAdir').value; document.getElementById('qAdirV').textContent=vecs.QA.dir+'°';
  vecs.QB.mod=+document.getElementById('qBmod').value; document.getElementById('qBmodV').textContent=vecs.QB.mod+' cm';
  vecs.QB.dir=+document.getElementById('qBdir').value; document.getElementById('qBdirV').textContent=vecs.QB.dir+'°';
  if(!Q.checked) _resetQPos();
  drawQuiz();
}

// Helper: is B⃗ already inverted by user? (punta near −B position)
function _bInverted(){
  const nb=compNeg(vecs.QB);
  return Math.hypot(Q.tipB_user.x-nb.x, Q.tipB_user.y-nb.y)<0.6;
}

function _updateQuizHint(){
  if(Q.checked) return;
  const fb=document.getElementById('quizFeedback');
  const inv=_bInverted();
  const a=comp(vecs.QA);
  if(METHOD==='punta'){
    const tailOk=Math.hypot(Q.tailNB.x-a.x,Q.tailNB.y-a.y)<0.6;
    if(!inv){
      fb.textContent='Passo 1: trascina la punta di B\u20d7 nel punto opposto per ottenere −B\u20d7.';
    } else if(!tailOk){
      fb.textContent='Ottimo! −B\u20d7 ottenuto. Ora trascina la coda (pallino viola) sulla punta di A\u20d7.';
    } else {
      fb.textContent='Perfetto! Ora trascina D\u20d7 (pallino verde) sulla risultante.';
    }
  } else {
    if(!inv){
      fb.textContent='Passo 1: trascina la punta di B\u20d7 nel punto opposto per ottenere −B\u20d7.';
    } else {
      fb.textContent='Ottimo! −B\u20d7 ottenuto. Ora trascina D\u20d7 (pallino verde) sulla diagonale del parallelogramma su A\u20d7 e −B\u20d7.';
    }
  }
  fb.className='feedback-box idle';
}

function drawQuiz(){
  drawGrid();
  const vA=vecs.QA,vB=vecs.QB;
  const a=comp(vA),b=comp(vB),nb=compNeg(vB);
  const O=toC(0,0);
  const tipA=toC(a.x,a.y);
  const tipB_corr=toC(b.x,b.y);
  const V=toC(a.x+b.x,a.y+b.y);
  const corrD={x:a.x-b.x,y:a.y-b.y};

  dot(O.x,O.y,'#ffffff',4,0.5);

  if(METHOD==='punta'){
    // A fixed
    arrow(O.x,O.y,tipA.x,tipA.y,'#f97316',1,3,'A');
    modLabel(O.x,O.y,tipA.x,tipA.y,vA.mod+'cm','#f97316',1);

    // B with draggable tip — coda always at origin
    const uTipB=toC(Q.tipB_user.x,Q.tipB_user.y);
    const inv=_bInverted();
    // Ghost of original B appears as soon as tip moves at all
    const tipMoved = Math.hypot(Q.tipB_user.x-b.x, Q.tipB_user.y-b.y) > 0.15;
    if(tipMoved){
      arrow(O.x,O.y,tipB_corr.x,tipB_corr.y,'#3b82f6',0.28,2,'B');
      modLabel(O.x,O.y,tipB_corr.x,tipB_corr.y,vB.mod+'cm','#3b82f6',0.22);
    }
    // colour shifts blue to purple once inverted
    const bColor=inv?'#a855f7':'#3b82f6';
    const bLabel=inv?'−B':'B';
    arrow(O.x,O.y,uTipB.x,uTipB.y,bColor,1,2.5,bLabel);
    modLabel(O.x,O.y,uTipB.x,uTipB.y,vB.mod+'cm',bColor,1);
    dot(uTipB.x,uTipB.y,bColor,9,0.85);

    // Once inverted: show translatable -B (tail draggable) and D tip
    if(inv){
      const uTail=toC(Q.tailNB.x,Q.tailNB.y);
      const uTipNB=toC(Q.tailNB.x+nb.x,Q.tailNB.y+nb.y);
      arrow(uTail.x,uTail.y,uTipNB.x,uTipNB.y,'#a855f7',0.85,2.5,'-B');
      modLabel(uTail.x,uTail.y,uTipNB.x,uTipNB.y,vB.mod+'cm','#a855f7',0.85);
      dot(uTail.x,uTail.y,'#a855f7',9,0.85);

      const uD=toC(Q.tipD_pt.x,Q.tipD_pt.y);
      if(Math.hypot(Q.tipD_pt.x,Q.tipD_pt.y)>0.2){
        arrow(O.x,O.y,uD.x,uD.y,'#22c55e',0.9,3,'D');
      }
      dot(uD.x,uD.y,'#22c55e',9,0.85);
    }

    if(Q.showingCorr){
      const cTail=toC(a.x,a.y);
      const cD=toC(corrD.x,corrD.y);
      arrow(cTail.x,cTail.y,cD.x,cD.y,'#a855f7',0.45,2,'');
      arrow(O.x,O.y,cD.x,cD.y,'#22c55e',0.5,2.5,'');
    }

    // Show check button only when all three have been meaningfully placed
    if(!Q.checked){
      const ready=inv && Math.hypot(Q.tipD_pt.x,Q.tipD_pt.y)>0.2;
      document.getElementById('btnCheck').style.display=ready?'inline-block':'none';
    }

  } else {
    // PARA quiz — same B-inversion mechanic as punta, then user places D tip
    // Step 1: invert B to get -B (draggable tip, blue→purple)
    // Step 2: once -B is inverted, complete parallelogram on A and -B
    // Step 3: drag D tip to the correct diagonal vertex

    // A fixed
    arrow(O.x,O.y,tipA.x,tipA.y,'#f97316',1,3,'A');
    modLabel(O.x,O.y,tipA.x,tipA.y,vA.mod+'cm','#f97316');

    const uTipB=toC(Q.tipB_user.x,Q.tipB_user.y);
    const inv=_bInverted();
    const tipMoved=Math.hypot(Q.tipB_user.x-b.x,Q.tipB_user.y-b.y)>0.15;

    // Ghost of original B
    if(tipMoved){
      arrow(O.x,O.y,tipB_corr.x,tipB_corr.y,'#3b82f6',0.28,2,'B');
      modLabel(O.x,O.y,tipB_corr.x,tipB_corr.y,vB.mod+'cm','#3b82f6',0.22);
    } else {
      arrow(O.x,O.y,tipB_corr.x,tipB_corr.y,'#3b82f6',1,3,'B');
      modLabel(O.x,O.y,tipB_corr.x,tipB_corr.y,vB.mod+'cm','#3b82f6');
    }

    // Draggable B tip (shifts to purple when inverted)
    const bCol=inv?'#a855f7':'#3b82f6';
    const bLab=inv?'-B':'B';
    if(tipMoved){
      arrow(O.x,O.y,uTipB.x,uTipB.y,bCol,1,2.5,bLab);
      modLabel(O.x,O.y,uTipB.x,uTipB.y,vB.mod+'cm',bCol,1);
    }
    dot(uTipB.x,uTipB.y,bCol,9,0.85);

    // Once -B is placed: draw parallelogram on A and -B, then D tip
    if(inv){
      const tipNB=toC(nb.x,nb.y);
      const V2=toC(a.x+nb.x,a.y+nb.y);
      // parallelogram
      parallelogramShape(O,tipA,tipNB,V2,0.7);
      ctx.save();ctx.globalAlpha=0.3;
      ctx.strokeStyle='#a855f7';ctx.lineWidth=1.2;ctx.setLineDash([4,5]);
      ctx.beginPath();ctx.moveTo(tipA.x,tipA.y);ctx.lineTo(V2.x,V2.y);ctx.stroke();
      ctx.strokeStyle='#f97316';
      ctx.beginPath();ctx.moveTo(tipNB.x,tipNB.y);ctx.lineTo(V2.x,V2.y);ctx.stroke();
      ctx.setLineDash([]);ctx.restore();
      dot(V2.x,V2.y,'#ffffff',4,0.4);

      const uD=toC(Q.tipD_para.x,Q.tipD_para.y);
      if(Math.hypot(Q.tipD_para.x,Q.tipD_para.y)>0.2){
        arrow(O.x,O.y,uD.x,uD.y,'#22c55e',0.9,3,'D');
      }
      dot(uD.x,uD.y,'#22c55e',9,0.85);
    }

    if(Q.showingCorr){
      const tipNB=toC(nb.x,nb.y);
      const V2=toC(a.x+nb.x,a.y+nb.y);
      arrow(O.x,O.y,V2.x,V2.y,'#22c55e',0.6,2.5,'');
      dot(V2.x,V2.y,'#22c55e',6,0.7);
    }

    if(!Q.checked){
      const ready=inv && Math.hypot(Q.tipD_para.x,Q.tipD_para.y)>0.2;
      document.getElementById('btnCheck').style.display=ready?'inline-block':'none';
    }
  }
}

function checkQuiz(){
  const vA=vecs.QA,vB=vecs.QB;
  const a=comp(vA),b=comp(vB),nb=compNeg(vB);
  const corrD={x:a.x-b.x,y:a.y-b.y};
  const TOL=0.7;
  const fb=document.getElementById('quizFeedback');
  Q.checked=true;

  if(METHOD==='punta'){
    const invOk=_bInverted();
    const tailOk=Math.hypot(Q.tailNB.x-a.x,Q.tailNB.y-a.y)<TOL;
    const tipOk =Math.hypot(Q.tipD_pt.x-corrD.x,Q.tipD_pt.y-corrD.y)<TOL;
    if(invOk&&tailOk&&tipOk){
      fb.textContent='🎉 Perfetto! Hai invertito B\u20d7 in −B\u20d7, l\'hai traslato sulla punta di A\u20d7 e D\u20d7 è corretto!';
      fb.className='feedback-box correct';
      document.getElementById('btnShowCorr').style.display='none';
    } else {
      let msgs=[];
      if(!invOk) msgs.push('B\u20d7 non è stato invertito correttamente (la punta deve essere nel punto opposto)');
      if(!tailOk) msgs.push('la coda di −B\u20d7 non è sulla punta di A\u20d7');
      if(!tipOk)  msgs.push('la punta di D\u20d7 non è corretta');
      fb.textContent='✗ '+msgs.join('; ')+'.';
      fb.className='feedback-box wrong';
      document.getElementById('btnShowCorr').style.display='inline-block';
    }
  } else {
    // Para: need B inverted AND D placed at V2 = a+nb = (ax-bx, ay-by)
    const invOk=_bInverted();
    const V2corr={x:a.x+nb.x, y:a.y+nb.y};
    const tipOk=Math.hypot(Q.tipD_para.x-V2corr.x,Q.tipD_para.y-V2corr.y)<TOL;
    if(invOk&&tipOk){
      fb.textContent='🎉 Esatto! Hai invertito B\u20d7 in −B\u20d7, costruito il parallelogramma su A\u20d7 e −B\u20d7, e D\u20d7 è la diagonale principale.';
      fb.className='feedback-box correct';
      document.getElementById('btnShowCorr').style.display='none';
    } else {
      let msgs=[];
      if(!invOk) msgs.push('B\u20d7 non è stato invertito in −B\u20d7');
      if(!tipOk)  msgs.push('la punta di D\u20d7 non è nel punto corretto (Ax−Bx, Ay−By)');
      fb.textContent='✗ '+msgs.join('; ')+'.';
      fb.className='feedback-box wrong';
      document.getElementById('btnShowCorr').style.display='inline-block';
    }
  }
  document.getElementById('btnCheck').style.display='none';
}

function showCorrection(){
  const vA=vecs.QA,vB=vecs.QB;
  const a=comp(vA),nb=compNeg(vB);
  if(METHOD==='punta'){
    Q.tipB_user={x:nb.x,y:nb.y};
    Q.tailNB={x:a.x,y:a.y};
    Q.tipD_pt={x:a.x+nb.x,y:a.y+nb.y};
  } else {
    Q.tipB_user={x:nb.x,y:nb.y};
    Q.tipD_para={x:a.x+nb.x,y:a.y+nb.y};
  }
  Q.showingCorr=true; drawQuiz();
  document.getElementById('quizFeedback').textContent='✅ Ecco la soluzione corretta evidenziata.';
  document.getElementById('quizFeedback').className='feedback-box correct';
  document.getElementById('btnShowCorr').style.display='none';
}

// ═══════════════════════════════════════════
// DRAG
// ═══════════════════════════════════════════
function getXY(e){
  const r=canvas.getBoundingClientRect();
  const c=e.touches?e.touches[0]:e;
  return {x:c.clientX-r.left,y:c.clientY-r.top};
}
function snapGrid(g,s=0.5){return {x:Math.round(g.x/s)*s,y:Math.round(g.y/s)*s};}

canvas.addEventListener('mousedown',startDrag);
canvas.addEventListener('touchstart',startDrag,{passive:false});
canvas.addEventListener('mousemove',moveDrag);
canvas.addEventListener('touchmove',moveDrag,{passive:false});
canvas.addEventListener('mouseup',endDrag);
canvas.addEventListener('touchend',endDrag);

function startDrag(e){
  if(MODE!=='quiz')return; e.preventDefault();
  const {x,y}=getXY(e);
  const GRAB=22;
  if(METHOD==='punta'){
    const inv=_bInverted();
    // always allow dragging the B tip
    const uTipB=toC(Q.tipB_user.x,Q.tipB_user.y);
    if(Math.hypot(x-uTipB.x,y-uTipB.y)<GRAB){ Q.dragging='tipB_user'; return; }
    if(inv){
      const uTail=toC(Q.tailNB.x,Q.tailNB.y);
      const uD=toC(Q.tipD_pt.x,Q.tipD_pt.y);
      if(Math.hypot(x-uTail.x,y-uTail.y)<GRAB) Q.dragging='tailNB';
      else if(Math.hypot(x-uD.x,y-uD.y)<GRAB)  Q.dragging='tipD_pt';
    }
  } else {
    const uTipBp=toC(Q.tipB_user.x,Q.tipB_user.y);
    if(Math.hypot(x-uTipBp.x,y-uTipBp.y)<GRAB){ Q.dragging='tipB_user'; return; }
    if(_bInverted()){
      const uDp=toC(Q.tipD_para.x,Q.tipD_para.y);
      if(Math.hypot(x-uDp.x,y-uDp.y)<GRAB) Q.dragging='tipD_para';
    }
  }
}
function moveDrag(e){
  if(MODE!=='quiz'||!Q.dragging)return; e.preventDefault();
  const {x,y}=getXY(e);
  const g=snapGrid(toG(x,y));
  if(Q.dragging==='tipB_user')  Q.tipB_user=g;
  else if(Q.dragging==='tailNB')     Q.tailNB=g;
  else if(Q.dragging==='tipD_pt')    Q.tipD_pt=g;
  else if(Q.dragging==='tipD_para')  Q.tipD_para=g;
  if(!Q.checked){ _updateQuizHint(); drawQuiz(); }
}
function endDrag(){Q.dragging=null;}

// ═══════════════════════════════════════════
// VERSO
// ═══════════════════════════════════════════
function setVerso(key,val,btn){
  vecs[key].verso=val;
  btn.parentElement.querySelectorAll('.verso-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  drawScene();
}

// ═══════════════════════════════════════════
// ANIM LOOP
// ═══════════════════════════════════════════
function animLoop(ts){
  if(!ANIM.playing)return;
  if(!ANIM.lastTs)ANIM.lastTs=ts;
  const dt=ts-ANIM.lastTs;ANIM.lastTs=ts;
  ANIM.t=Math.min(1,ANIM.t+dt/STEP_DUR);
  document.getElementById('progBar').style.width=((ANIM.step+ANIM.t)/3*100)+'%';
  drawScene();
  if(ANIM.t>=1){
    if(ANIM.step<2){ANIM.step++;ANIM.t=0;ANIM.lastTs=null;updateStepBar();}
    else{ANIM.playing=false;document.getElementById('btnPlay').textContent='▶ Play';return;}
  }
  ANIM.raf=requestAnimationFrame(animLoop);
}
function togglePlay(){
  if(ANIM.playing){ANIM.playing=false;ANIM.lastTs=null;cancelAnimationFrame(ANIM.raf);document.getElementById('btnPlay').textContent='▶ Play';}
  else{if(ANIM.step===2&&ANIM.t>=1)restartAnim();ANIM.playing=true;ANIM.lastTs=null;document.getElementById('btnPlay').textContent='⏸ Pausa';ANIM.raf=requestAnimationFrame(animLoop);}
}
function restartAnim(){
  ANIM.playing=false;cancelAnimationFrame(ANIM.raf);ANIM.lastTs=null;
  ANIM.step=0;ANIM.t=0;
  document.getElementById('btnPlay').textContent='▶ Play';
  document.getElementById('progBar').style.width='0%';
  updateStepBar();drawScene();
}
function goStep(n){
  ANIM.playing=false;cancelAnimationFrame(ANIM.raf);ANIM.lastTs=null;
  document.getElementById('btnPlay').textContent='▶ Play';
  ANIM.step=n;ANIM.t=n===0?0:1;
  updateStepBar();drawScene();
  document.getElementById('progBar').style.width=((n+ANIM.t)/3*100)+'%';
}
function updateStepBar(){
  const explains=METHOD==='punta'?EXPLAINS_PUNTA:EXPLAINS_PARA;
  const steps=document.querySelectorAll('.step-btn');
  steps.forEach((el,i)=>{
    el.className='step-btn'+(i===ANIM.step?' active':i<ANIM.step?' done':'');
    el.querySelector('.step-dot').textContent=i<ANIM.step?'✓':i+1;
  });
  const ex=document.getElementById('animExplain');
  if(ex) ex.innerHTML=explains[ANIM.step];
}

// ═══════════════════════════════════════════
// SCENE DISPATCHER
// ═══════════════════════════════════════════
function drawScene(){
  if(MODE==='anim'){
    if(METHOD==='punta') drawPunta_anim();
    else drawPara_anim();
  } else if(MODE==='free'){
    if(METHOD==='punta') drawPunta_free();
    else drawPara_free();
  } else {
    drawQuiz();
  }
}

function buildPanel_anim(){
  const keyPunta=`<div class="key-idea">Idea chiave: <span class="kw">A&#x20D7; − B&#x20D7; = A&#x20D7; + (−B&#x20D7;)</span><br>Si inverte B&#x20D7; ottenendo −B&#x20D7; (stesso modulo, verso opposto), poi si applica il metodo punta-coda.</div>`;
  const keyPara=`<div class="key-idea">Nel parallelogramma costruito su A&#x20D7; e B&#x20D7;, la diagonale secondaria (da punta B&#x20D7; a punta A&#x20D7;) è il vettore A&#x20D7;−B&#x20D7; come vettore libero. <span class="kw">D&#x20D7;</span> viene poi ridisegnato dall'origine con lo stesso verso.</div>`;
  const legends_punta=`
    <div class="notch-row"><div class="notch-line" style="background:#f97316"></div><span>A&#x20D7;</span></div>
    <div class="notch-row"><div class="notch-dash"></div><span>B&#x20D7; originale (fantasma)</span></div>
    <div class="notch-row"><div class="notch-line" style="background:#a855f7"></div><span>−B&#x20D7; (verso invertito)</span></div>
    <div class="notch-row"><div class="notch-line" style="background:#22c55e"></div><span>D&#x20D7; = A&#x20D7; − B&#x20D7;</span></div>`;
  const legends_para=`
    <div class="notch-row"><div class="notch-line" style="background:#f97316"></div><span>A&#x20D7;</span></div>
    <div class="notch-row"><div class="notch-line" style="background:#3b82f6"></div><span>B&#x20D7;</span></div>
    <div class="notch-row"><div class="notch-line" style="background:rgba(255,255,255,0.2)"></div><span>A&#x20D7;+B&#x20D7; (prima diagonale, sfondo)</span></div>
    <div class="notch-row"><div class="notch-line" style="background:#22c55e"></div><span>D&#x20D7; = A&#x20D7;−B&#x20D7; (seconda diagonale)</span></div>`;
  return `
  <div class="p-section">
    <div class="p-title">Animazione</div>
    <div class="anim-controls">
      <button class="btn primary" id="btnPlay" onclick="togglePlay()">▶ Play</button>
      <button class="btn" onclick="restartAnim()">↺</button>
      <div class="prog-wrap"><div class="prog-bar" id="progBar" style="width:0%"></div></div>

  </div>
  <div class="p-section">
    <div class="p-title">Legenda</div>
    ${METHOD==='punta'?legends_punta:legends_para}
  </div>`;
}

function buildPanel_free(){
  const keyPunta=`<div class="key-idea" style="margin-bottom:12px"><span class="kw">A&#x20D7; − B&#x20D7; = A&#x20D7; + (−B&#x20D7;)</span> — B&#x20D7; tratteggiato mostra la posizione originale; −B&#x20D7; viola è il vettore invertito, traslato sulla punta di A&#x20D7;.</div>`;
  const keyPara=`<div class="key-idea" style="margin-bottom:12px">La <span class="kw">seconda diagonale</span> del parallelogramma (da punta B&#x20D7; a punta A&#x20D7;) è D&#x20D7; = A&#x20D7; − B&#x20D7;. La prima diagonale (grigia) è A&#x20D7; + B&#x20D7;.</div>`;
  return `
  <div class="p-section">
    <div class="p-title">Modalità libera</div>
    ${METHOD==='punta'?keyPunta:keyPara}
  </div>
  ${vecControls('','freeUpdate',{Amod:'fAmod',AmodV:'fAmodV',Adir:'fAdir',AdirV:'fAdirV',Bmod:'fBmod',BmodV:'fBmodV',Bdir:'fBdir',BdirV:'fBdirV'})}

function buildPanel_quiz(){
  const instrPunta=`<strong>Traccia D&#x20D7; = A&#x20D7; − B&#x20D7;</strong> con il metodo punta-coda:<br>
    <span class="sl">1</span> Trascina la <strong style="color:#3b82f6">punta di B&#x20D7;</strong> (pallino blu) nel punto <strong>opposto</strong> per ottenere <span style="color:#a855f7">−B&#x20D7;</span><br>

  return `

      <button class="btn success" id="btnShowCorr" onclick="showCorrection()" style="display:none">Mostra soluzione</button>
      <button class="btn" onclick="newQuiz()">Nuovo esercizio</button>

}

// ═══════════════════════════════════════════
// METHOD / MODE SWITCHING
// ═══════════════════════════════════════════
function setMethod(m){
  METHOD=m;
  document.getElementById('mthPunta').className='tab'+(m==='punta'?' active':'');
  document.getElementById('mthPara').className='tab'+(m==='para'?' active':'');
  ANIM.playing=false;cancelAnimationFrame(ANIM.raf);
  ANIM.step=0;ANIM.t=0;
  rebuildPanel();
  setTimeout(()=>{resize();updateStepBar();},20);
}

function setMode(m){
  MODE=m;
  ['anim','free','quiz'].forEach(id=>{
    document.getElementById('tab'+id.charAt(0).toUpperCase()+id.slice(1)).className='tab'+(id===m?' active':'');
  });
  if(m!=='anim'){ANIM.playing=false;cancelAnimationFrame(ANIM.raf);}
  rebuildPanel();
  if(m==='quiz') initQuiz();
  setTimeout(()=>resize(),20);
}

function rebuildPanel(){
  const sb=document.getElementById('stepBar');
  sb.style.display=(MODE==='anim')?'flex':'none';
  if(MODE==='anim') sb.innerHTML=METHOD==='punta'?buildStepBar_punta():buildStepBar_para();

  const panel=document.getElementById('panel');
  if(MODE==='anim')      panel.innerHTML=buildPanel_anim();
  else if(MODE==='free') panel.innerHTML=buildPanel_free();
  else                   panel.innerHTML=buildPanel_quiz();

  if(MODE==='anim') updateStepBar();
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
rebuildPanel();
setTimeout(()=>{ resize(); drawScene(); },60);
