<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Primo Esperimento di Faraday sull'Induzione Elettromagnetica</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:      #09090e;
  --surf:    #0f1018;
  --border:  #1e2030;
  --text:    #cdd0e8;
  --dim:     #40445e;
  --accent:  #e8a040;
  --pri:     #c87828;
  --sec:     #2868d0;
}
html, body {
  width:100%; height:100%; overflow:hidden;
  background:var(--bg); color:var(--text);
  font-family:'JetBrains Mono',monospace;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
}
header { text-align:center; padding:8px 0 5px; flex-shrink:0; }
header h1 {
  font-family:'Playfair Display',serif;
  font-size:clamp(13px,1.7vw,18px);
  font-weight:400; font-style:italic;
  color:var(--accent); line-height:1.4;
}
header p {
  font-size:8.5px; letter-spacing:4px; text-transform:uppercase;
  color:var(--dim); margin-top:3px;
}
#canvas-wrap { position:relative; flex-shrink:0; }
canvas { display:block; }

/* ── Controls row ── */
#controls {
  display:flex; align-items:center; gap:20px;
  padding:8px 0 4px; flex-shrink:0;
}
#sw-btn {
  font-family:'JetBrains Mono',monospace;
  font-size:11px; letter-spacing:2px; text-transform:uppercase;
  padding:9px 22px;
  border:1.5px solid #30324a; background:transparent; color:#404458;
  border-radius:2px; cursor:pointer; transition:all .22s; user-select:none;
}
#sw-btn:hover { border-color:var(--accent); color:var(--accent); }
#sw-btn.on {
  border-color:var(--accent); color:var(--accent);
  background:rgba(232,160,64,.07);
  box-shadow:0 0 16px rgba(232,160,64,.18);
}

/* ── Voltage slider ── */
#volt-wrap {
  display:flex; align-items:center; gap:10px;
}
#volt-wrap label {
  font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--dim);
  white-space:nowrap;
}
#volt-slider {
  -webkit-appearance:none; appearance:none;
  width:110px; height:3px;
  background:linear-gradient(90deg, #cc3333 0%, #e8a040 50%, #ffee44 100%);
  border-radius:2px; outline:none; cursor:pointer;
}
#volt-slider::-webkit-slider-thumb {
  -webkit-appearance:none; width:14px; height:14px;
  border-radius:50%; background:#e8a040;
  border:2px solid #0f1018;
  box-shadow:0 0 8px rgba(232,160,64,.6);
  cursor:grab;
}
#volt-val {
  font-size:10px; color:var(--accent); min-width:32px; text-align:right;
}

#status {
  font-size:10px; letter-spacing:.4px; font-style:italic;
  color:var(--dim); text-align:center; min-width:280px;
  transition:color .3s; flex-shrink:0; padding:1px 0;
}
#status.induced { color:#ffd880; }
#status.active  { color:#88ccff; }
#explain {
  font-size:10px; line-height:1.9; color:var(--dim);
  text-align:center; max-width:680px; padding:2px 16px 8px; flex-shrink:0;
}
#explain strong { color:var(--text); font-weight:400; }
#explain em     { color:var(--accent); font-style:normal; }
</style>
</head>
<body>
<header>
  <h1>Primo Esperimento di Faraday<br>sull'Induzione Elettromagnetica</h1>
  <p>Londra · 29 agosto 1831</p>
</header>

<div id="canvas-wrap"><canvas id="c"></canvas></div>

<div id="controls">
  <button id="sw-btn" onclick="toggleSwitch()">◯ &nbsp;Interruttore</button>
  <div id="volt-wrap">
    <label>Tensione</label>
    <input type="range" id="volt-slider" min="1" max="12" step="0.5" value="6">
    <span id="volt-val">6 V</span>
  </div>
  <div id="status">Interruttore aperto — nessuna corrente</div>
</div>

<div id="explain">
  Chiudi l'interruttore e <em>varia la tensione</em> per indurre corrente nella <strong>bobina secondaria</strong>.
  Solo la <em>variazione</em> della corrente primaria genera una forza elettromotrice.
</div>

<script>
// ─── Canvas ────────────────────────────────────────────────
const cv  = document.getElementById('c');
const ctx = cv.getContext('2d');
const W   = Math.min(window.innerWidth * 0.96, 820);
const H   = Math.min(window.innerHeight * 0.50, 340);
cv.width  = W; cv.height = H;

// ─── Layout ────────────────────────────────────────────────
const RING_CX = W * 0.500;
const RING_CY = H * 0.475;
const RING_R  = Math.min(W,H) * 0.260;
const RING_TH = Math.min(W,H) * 0.068;

function ringPt(ang, r){ return { x: RING_CX+Math.cos(ang)*r, y: RING_CY-Math.sin(ang)*r }; }

const COIL_TURNS = 8;
const L_TOP_ANG  = Math.PI * 0.68;
const L_BOT_ANG  = Math.PI * 1.32;
const R_TOP_ANG  = Math.PI * 0.32;
const R_BOT_ANG  = -Math.PI * 0.32;

const ltPt = ringPt(L_TOP_ANG, RING_R + RING_TH*0.5);
const lbPt = ringPt(L_BOT_ANG, RING_R + RING_TH*0.5);
const rtPt = ringPt(R_TOP_ANG, RING_R + RING_TH*0.5);
const rbPt = ringPt(R_BOT_ANG, RING_R + RING_TH*0.5);

const BAT_X  = RING_CX - RING_R - 88;
const BAT_Y  = RING_CY;
const SW_X   = RING_CX - RING_R - 50;
const SW_Y   = RING_CY - RING_R - 30;
const BULB_X = RING_CX + RING_R + 74;
const BULB_Y = RING_CY;

const WIRE_TOP_Y   = Math.min(ltPt.y, SW_Y) - 14;
const WIRE_BOT_Y   = Math.max(lbPt.y, BAT_Y+26) + 12;
const WIRE_TOP_Y_R = Math.min(rtPt.y, BULB_Y-36) - 14;
const WIRE_BOT_Y_R = Math.max(rbPt.y, BULB_Y+36) + 12;

// ─── Physics ───────────────────────────────────────────────
let switchOn   = false;
let voltTarget = 6;    // user-set voltage
let voltActual = 0;    // actual voltage (tracks target when switch closed)
let prevVolt   = 0;
let dVoltDt    = 0;
let I_primary  = 0;
let I_induced  = 0;
let bulbBri    = 0;

// Voltage slider
const vslider = document.getElementById('volt-slider');
const vval    = document.getElementById('volt-val');
vslider.addEventListener('input', () => {
  voltTarget = +vslider.value;
  vval.textContent = voltTarget + ' V';
});

// ─── Wire paths ────────────────────────────────────────────
// Primary: battery → switch → left coil → battery
// For 3-D effect: wire goes BEHIND the ring at the bottom sections.
// We split each circuit into front segments (drawn after ring) and back segments (drawn before).

function buildPrimaryPath(){
  const pts = [];
  const add = (x,y) => pts.push({x,y});
  const S = 12;

  // Battery (+) up to wire top
  for(let i=0;i<=S;i++) add(BAT_X, BAT_Y-24 - i*(WIRE_TOP_Y-BAT_Y+24)/S);
  // Across to switch
  for(let i=0;i<=S;i++) add(BAT_X + i*(SW_X-BAT_X)/S, WIRE_TOP_Y);
  // Switch to coil top exit (diagonal)
  for(let i=0;i<=S;i++) add(SW_X+30 + i*(ltPt.x-SW_X-30)/S, WIRE_TOP_Y + i*(ltPt.y-WIRE_TOP_Y)/S);

  // Coil windings on left arm
  const coilSteps = 90;
  for(let i=0;i<=coilSteps;i++){
    const f    = i/coilSteps;
    const ang  = L_TOP_ANG - f*(L_TOP_ANG-L_BOT_ANG);
    const wave = Math.sin(f*Math.PI*2*COIL_TURNS);
    const r    = RING_R + RING_TH*(0.5 + wave*0.92);
    add(RING_CX+Math.cos(ang)*r, RING_CY-Math.sin(ang)*r);
  }

  // Coil bot exit → down → battery (-)
  for(let i=0;i<=S;i++) add(lbPt.x + i*(BAT_X-lbPt.x)/S, lbPt.y + i*(WIRE_BOT_Y-lbPt.y)/S);
  for(let i=0;i<=S;i++) add(BAT_X, WIRE_BOT_Y - i*(WIRE_BOT_Y-(BAT_Y+24))/S);
  return pts;
}

function buildSecondaryPath(){
  const pts = [];
  const add = (x,y) => pts.push({x,y});
  const S = 12;

  // Coil windings on right arm
  const coilSteps = 90;
  for(let i=0;i<=coilSteps;i++){
    const f    = i/coilSteps;
    const ang  = R_TOP_ANG - f*(R_TOP_ANG-R_BOT_ANG);
    const wave = Math.sin(f*Math.PI*2*COIL_TURNS);
    const r    = RING_R + RING_TH*(0.5 + wave*0.92);
    add(RING_CX+Math.cos(ang)*r, RING_CY-Math.sin(ang)*r);
  }

  // Coil bot exit → down → bulb base → bulb filament loop → up → coil top exit
  const botBY = BULB_Y + 36;
  for(let i=0;i<=S;i++) add(rbPt.x + i*(BULB_X-rbPt.x)/S, rbPt.y + i*(botBY-rbPt.y)/S);
  for(let k=0;k<=14;k++){
    const a = Math.PI/2 - k/14*Math.PI*2;
    add(BULB_X+Math.cos(a)*9, botBY-9+Math.sin(a)*9);
  }
  const topBY = botBY - 18;
  for(let i=0;i<=S;i++) add(BULB_X, topBY + i*(WIRE_TOP_Y_R-topBY)/S);
  for(let i=0;i<=S;i++) add(BULB_X - i*(BULB_X-rtPt.x)/S, WIRE_TOP_Y_R + i*(rtPt.y-WIRE_TOP_Y_R)/S);
  return pts;
}

const primaryPath   = buildPrimaryPath();
const secondaryPath = buildSecondaryPath();

// ─── Wire segment lists (for layered drawing) ──────────────
// We define which portions are "back" (behind ring, draw first, dim)
// vs "front" (draw after ring, bright).
// Back = bottom arc of circuit that visually passes behind the ring.
// We approximate: y > RING_CY + RING_R*0.3 → behind.

function segmentPath(pts){
  // returns {front: [{x,y},...], back: [{x,y},...]}
  // split by whether point is in the "back zone" (lower arc)
  const front = [], back = [];
  pts.forEach(p => {
    const dx = p.x - RING_CX, dy = p.y - RING_CY;
    const dist = Math.sqrt(dx*dx+dy*dy);
    // "behind ring" = distance close to ring radius AND lower half
    const behind = dist > RING_R*0.55 && dist < RING_R*1.55 && p.y > RING_CY + RING_R*0.28;
    (behind ? back : front).push(p);
  });
  return {front, back};
}

// ─── Dot class ─────────────────────────────────────────────
class Dot {
  constructor(path, color, phase){
    this.path  = path;
    this.color = color;
    this.t     = phase;
    this.alpha = 0;
    this.spd   = 0;
  }
  update(dt, amplitude, dir){
    if(amplitude > 0.015){
      this.t = ((this.t + dt*0.30*dir*amplitude)%1+1)%1;
      this.alpha = Math.min(1, this.alpha + dt*5);
    } else {
      this.alpha = Math.max(0, this.alpha - dt*4);
    }
  }
  getPos(){
    const L = this.path.length-1;
    const s = this.t*L, i = Math.floor(s), f = s-i;
    const a = this.path[Math.min(i,L)], b = this.path[Math.min(i+1,L)];
    return {x:a.x+(b.x-a.x)*f, y:a.y+(b.y-a.y)*f};
  }
  draw(alphaScale=1){
    if(this.alpha < 0.01) return;
    const p = this.getPos();
    ctx.save();
    ctx.globalAlpha = this.alpha * 0.92 * alphaScale;
    ctx.shadowBlur  = 12; ctx.shadowColor = this.color;
    ctx.fillStyle   = this.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,3.2,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur  = 0; ctx.globalAlpha *= 0.55;
    ctx.fillStyle   = '#fff';
    ctx.beginPath(); ctx.arc(p.x,p.y,1.1,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
  isBehind(){
    const p = this.getPos();
    const dx=p.x-RING_CX, dy=p.y-RING_CY;
    const d=Math.sqrt(dx*dx+dy*dy);
    return d>RING_R*0.55 && d<RING_R*1.55 && p.y>RING_CY+RING_R*0.28;
  }
}

const N_PRI=16, N_SEC=14;
const priDots = Array.from({length:N_PRI},(_,i)=>new Dot(primaryPath,  '#ffcc55',i/N_PRI));
const secDots = Array.from({length:N_SEC},(_,i)=>new Dot(secondaryPath,'#55ccff',i/N_SEC));

// ─── Draw helpers ──────────────────────────────────────────
function rrect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

// ─── Draw: wires (front or back layer) ─────────────────────
function drawWireSegs(pts, color, isFront){
  if(pts.length < 2) return;
  ctx.save();
  if(isFront){
    ctx.strokeStyle = color;
    ctx.lineWidth   = 3.0;
    ctx.globalAlpha = 1.0;
    ctx.shadowBlur  = 8; ctx.shadowColor = color;
  } else {
    // behind the ring: darker, no glow
    ctx.strokeStyle = color;
    ctx.lineWidth   = 2.2;
    ctx.globalAlpha = 0.28;
    ctx.shadowBlur  = 0;
  }
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.stroke();
  ctx.restore();
}

// Draw all wires split into back/front
function drawAllWires(priColor, secColor){
  // Straight external segments (always front)
  const straight = [
    // Primary
    [{x:BAT_X,y:BAT_Y-24},{x:BAT_X,y:WIRE_TOP_Y}],
    [{x:BAT_X,y:WIRE_TOP_Y},{x:SW_X,y:WIRE_TOP_Y}],
    [{x:SW_X+30,y:WIRE_TOP_Y},{x:ltPt.x,y:WIRE_TOP_Y},{x:ltPt.x,y:ltPt.y}],
    [{x:lbPt.x,y:lbPt.y},{x:lbPt.x,y:WIRE_BOT_Y},{x:BAT_X,y:WIRE_BOT_Y},{x:BAT_X,y:BAT_Y+24}],
    // Secondary
    [{x:rtPt.x,y:rtPt.y},{x:rtPt.x,y:WIRE_TOP_Y_R},{x:BULB_X,y:WIRE_TOP_Y_R},{x:BULB_X,y:BULB_Y-24}],
    [{x:BULB_X,y:BULB_Y+10+18},{x:BULB_X,y:WIRE_BOT_Y_R},{x:rbPt.x,y:WIRE_BOT_Y_R},{x:rbPt.x,y:rbPt.y}],
  ];

  straight.forEach((seg, idx) => {
    const col = idx < 4 ? priColor : secColor;
    drawWireSegs(seg, col, true);
  });
}

// ─── Draw: iron ring ───────────────────────────────────────
function drawRing(){
  ctx.save();
  const grad = ctx.createLinearGradient(
    RING_CX-RING_R, RING_CY-RING_R,
    RING_CX+RING_R, RING_CY+RING_R
  );
  grad.addColorStop(0.00,'#383848');
  grad.addColorStop(0.25,'#5c5e6e');
  grad.addColorStop(0.50,'#767888');
  grad.addColorStop(0.75,'#5c5e6e');
  grad.addColorStop(1.00,'#383848');

  ctx.strokeStyle = grad;
  ctx.lineWidth   = RING_TH * 2;
  ctx.shadowBlur  = 16; ctx.shadowColor = 'rgba(0,0,0,0.75)';
  ctx.beginPath(); ctx.arc(RING_CX,RING_CY,RING_R,0,Math.PI*2); ctx.stroke();

  // Specular highlight top
  const hi = ctx.createLinearGradient(RING_CX-RING_R,RING_CY-RING_R-RING_TH,RING_CX+RING_R,RING_CY-RING_R+RING_TH);
  hi.addColorStop(0,'rgba(210,210,240,0)');
  hi.addColorStop(0.45,'rgba(210,210,240,0.20)');
  hi.addColorStop(0.55,'rgba(210,210,240,0.20)');
  hi.addColorStop(1,'rgba(210,210,240,0)');
  ctx.strokeStyle = hi; ctx.lineWidth = RING_TH*0.38; ctx.shadowBlur=0;
  ctx.beginPath(); ctx.arc(RING_CX,RING_CY-RING_TH*0.45,RING_R,Math.PI*0.12,Math.PI*0.88); ctx.stroke();

  ctx.fillStyle='rgba(140,142,168,0.42)';
  ctx.font=`300 ${Math.round(W*0.013)}px 'JetBrains Mono',monospace`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('nucleo di ferro',RING_CX,RING_CY);
  ctx.restore();
}

// ─── Draw: coil ────────────────────────────────────────────
function drawCoil(angTop, angBot, color, hiColor, label, iActive){
  const N=COIL_TURNS, steps=200;
  ctx.save();

  if(iActive>0.03){
    ctx.shadowBlur=14*iActive; ctx.shadowColor=color;
  }

  for(let layer=-1;layer<=1;layer++){
    const lr   = RING_R + layer*RING_TH*0.28;
    const al   = layer===0?1.0:0.32;
    const col  = layer===0?color:(layer>0?hiColor:'#181820');
    const lw   = layer===0?3.8:2.0;
    ctx.globalAlpha = al;
    ctx.strokeStyle = col;
    ctx.lineWidth   = lw;
    ctx.lineCap     = 'round';
    ctx.beginPath();
    for(let i=0;i<=steps;i++){
      const f   = i/steps;
      const ang = angTop - f*(angTop-angBot);
      const wave= Math.sin(f*Math.PI*2*N);
      const r   = lr + RING_TH*wave*(layer===0?1.05:0.9);
      const x   = RING_CX+Math.cos(ang)*r;
      const y   = RING_CY-Math.sin(ang)*r;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.stroke();
  }

  // specular
  ctx.globalAlpha=0.20; ctx.strokeStyle='#ffffff'; ctx.lineWidth=0.9; ctx.shadowBlur=0;
  ctx.beginPath();
  for(let i=0;i<=steps;i++){
    const f=i/steps, ang=angTop-f*(angTop-angBot);
    const wave=Math.sin(f*Math.PI*2*N);
    const r=RING_R+RING_TH*(wave*1.05-0.4);
    i===0?ctx.moveTo(RING_CX+Math.cos(ang)*r-1.5,RING_CY-Math.sin(ang)*r-1.5):
          ctx.lineTo(RING_CX+Math.cos(ang)*r-1.5,RING_CY-Math.sin(ang)*r-1.5);
  }
  ctx.stroke();

  // label
  ctx.globalAlpha=1; ctx.shadowBlur=0;
  const midAng=(angTop+angBot)/2;
  ctx.fillStyle=color;
  ctx.font=`400 ${Math.round(W*0.013)}px 'JetBrains Mono',monospace`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(label, RING_CX+Math.cos(midAng)*(RING_R+RING_TH*2.9), RING_CY-Math.sin(midAng)*(RING_R+RING_TH*2.9));
  ctx.restore();
}

// ─── Draw: battery (improved) ──────────────────────────────
function drawBattery(x, y, voltNorm){
  ctx.save();
  const bw=22, bh=60, r=4;

  // Outer shell gradient
  const shellG = ctx.createLinearGradient(x-bw/2,y-bh/2, x+bw/2,y+bh/2);
  shellG.addColorStop(0,'#2a2c3e');
  shellG.addColorStop(0.4,'#1e2032');
  shellG.addColorStop(1,'#141624');
  ctx.shadowBlur=10; ctx.shadowColor='rgba(0,0,0,0.7)';
  rrect(x-bw/2,y-bh/2,bw,bh,r);
  ctx.fillStyle=shellG; ctx.fill();
  ctx.shadowBlur=0;
  ctx.strokeStyle='#2e3048'; ctx.lineWidth=1.5;
  rrect(x-bw/2,y-bh/2,bw,bh,r); ctx.stroke();

  // Inner charge level bar
  const fillH = (bh-10) * voltNorm;
  const fillY = y + bh/2 - 5 - fillH;
  const fillG = ctx.createLinearGradient(0,fillY,0,fillY+fillH);
  fillG.addColorStop(0,'#ffee66');
  fillG.addColorStop(0.5,'#e8a040');
  fillG.addColorStop(1,'#c83030');
  ctx.shadowBlur=6; ctx.shadowColor='#e8a040';
  rrect(x-bw/2+4, fillY, bw-8, fillH, 2);
  ctx.fillStyle=fillG; ctx.fill();
  ctx.shadowBlur=0;

  // Glass overlay
  const glassG = ctx.createLinearGradient(x-bw/2,y-bh/2, x+bw/2,y+bh/2);
  glassG.addColorStop(0,'rgba(255,255,255,0.06)');
  glassG.addColorStop(0.5,'rgba(255,255,255,0.01)');
  glassG.addColorStop(1,'rgba(0,0,0,0.08)');
  rrect(x-bw/2+1,y-bh/2+1,bw-2,bh-2,r-1);
  ctx.fillStyle=glassG; ctx.fill();

  // Tick lines
  ctx.strokeStyle='rgba(255,255,255,0.07)'; ctx.lineWidth=0.8;
  for(let i=1;i<5;i++){
    const ty=y-bh/2+5+i*(bh-10)/5;
    ctx.beginPath(); ctx.moveTo(x-bw/2+4,ty); ctx.lineTo(x+bw/2-4,ty); ctx.stroke();
  }

  // + terminal (top)
  const posG=ctx.createRadialGradient(x,y-bh/2-5,0,x,y-bh/2-5,6);
  posG.addColorStop(0,'#ff6666'); posG.addColorStop(1,'#cc2222');
  ctx.shadowBlur=8; ctx.shadowColor='#cc2222';
  ctx.fillStyle=posG; ctx.fillRect(x-5,y-bh/2-8,10,8); ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,120,120,0.9)';
  ctx.font=`bold 10px 'JetBrains Mono',monospace`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('+',x,y-bh/2-12);

  // − terminal (bottom)
  ctx.fillStyle='#3a3c54'; ctx.fillRect(x-5,y+bh/2,10,7);
  ctx.fillStyle='#6a6c84';
  ctx.fillText('−',x,y+bh/2+11);

  // Voltage label
  const vDisp = Math.round(voltNorm*12);
  ctx.fillStyle='rgba(232,160,64,0.75)';
  ctx.font=`400 8px 'JetBrains Mono',monospace`;
  ctx.fillText(vDisp+'V', x, y);

  ctx.restore();
}

// ─── Draw: switch ──────────────────────────────────────────
function drawSwitch(x, y, on){
  ctx.save();
  const len=30;
  ctx.fillStyle='#40425a';
  ctx.beginPath(); ctx.arc(x,y,5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+len,y,5,0,Math.PI*2); ctx.fill();

  const ang = on ? 0 : -Math.PI*0.28;
  ctx.strokeStyle = on?'#e8a040':'#38394e';
  ctx.lineWidth=3.8; ctx.lineCap='round';
  ctx.shadowBlur=on?14:0; ctx.shadowColor='#e8a040';
  ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+Math.cos(ang)*len,y+Math.sin(ang)*len); ctx.stroke();
  ctx.shadowBlur=0;

  ctx.fillStyle=on?'#e8a040':'#38394e';
  ctx.font=`300 8px 'JetBrains Mono',monospace`;
  ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.fillText(on?'chiuso':'aperto', x+len/2, y+9);
  ctx.restore();
}

// ─── Draw: bulb ────────────────────────────────────────────
function drawBulb(x, y, bri){
  ctx.save();
  const R=20, sH=14;

  if(bri>0.02){
    const g=ctx.createRadialGradient(x,y-4,0,x,y,R*4.5);
    g.addColorStop(0,`rgba(255,232,130,${bri*0.6})`);
    g.addColorStop(0.32,`rgba(255,185,55,${bri*0.2})`);
    g.addColorStop(1,'rgba(255,155,35,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,R*4.5,0,Math.PI*2); ctx.fill();
  }

  const gc=ctx.createRadialGradient(x-5,y-8,0,x,y,R);
  if(bri>0.02){
    gc.addColorStop(0,`rgba(255,252,210,${0.22+bri*0.6})`);
    gc.addColorStop(1,`rgba(255,195,70,${0.1+bri*0.3})`);
  } else {
    gc.addColorStop(0,'rgba(38,40,32,0.90)'); gc.addColorStop(1,'rgba(20,22,15,0.90)');
  }
  ctx.fillStyle=gc;
  ctx.strokeStyle=bri>0.04?`rgba(255,208,72,${0.55+bri*0.45})`:'#2e3028';
  ctx.lineWidth=1.6;
  ctx.shadowBlur=bri>0.02?24:0; ctx.shadowColor='#ffcc44';
  ctx.beginPath(); ctx.arc(x,y-4,R,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.shadowBlur=0;

  // Filament
  ctx.strokeStyle=bri>0.02?`rgba(255,212,82,${0.65+bri*0.35})`:'#222218';
  ctx.lineWidth=1.6; ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.shadowBlur=bri>0.02?14:0; ctx.shadowColor='#ffe060';
  ctx.beginPath();
  const fw=9,fz=5; ctx.moveTo(x-fw,y-1);
  for(let i=0;i<fz;i++) ctx.lineTo(x-fw+(i+0.5)*fw*2/fz, y-1+(i%2===0?-8:-1));
  ctx.lineTo(x+fw,y-1); ctx.stroke(); ctx.shadowBlur=0;

  ctx.strokeStyle='#3a3c32'; ctx.lineWidth=4.5;
  ctx.beginPath(); ctx.moveTo(x,y-4+R); ctx.lineTo(x,y-4+R+sH); ctx.stroke();
  ctx.fillStyle='#2e2e28'; ctx.strokeStyle='#484840'; ctx.lineWidth=1;
  rrect(x-12,y-4+R+sH,24,8,3); ctx.fill(); ctx.stroke();
  ctx.fillStyle=bri>0.1?'#ffcc44':'#3a3a30';
  ctx.shadowBlur=bri>0.1?8:0; ctx.shadowColor='#ffcc44';
  ctx.font=`300 9px 'JetBrains Mono',monospace`;
  ctx.textAlign='center'; ctx.textBaseline='bottom';
  ctx.fillText('lampada',x,y-4-R-5); ctx.shadowBlur=0;
  ctx.restore();
}

// ─── Update ────────────────────────────────────────────────
let lastTs = null;

function update(dt){
  // Voltage changes smoothly toward target when switch is on
  const prevVoltA = voltActual;
  if(switchOn){
    voltActual += (voltTarget - voltActual) * Math.min(1, dt*2.5);
    I_primary = voltActual / 12;
  } else {
    voltActual += (0 - voltActual) * Math.min(1, dt*3.0);
    I_primary = voltActual / 12;
  }

  dVoltDt = (voltActual - prevVoltA) / Math.max(dt, 0.001);

  // Induced current ∝ dV/dt (proxy for dI/dt in primary)
  const iTarget = Math.abs(dVoltDt) > 0.05
    ? Math.sign(dVoltDt) * Math.min(1, Math.abs(dVoltDt)*0.12) : 0;
  I_induced += (iTarget - I_induced) * Math.min(1, dt*9);

  bulbBri += (Math.min(1,Math.abs(I_induced)) - bulbBri) * Math.min(1, dt*12);

  priDots.forEach(d => d.update(dt, I_primary, 1));
  const sDir = Math.sign(I_induced)||1;
  secDots.forEach(d => d.update(dt, Math.abs(I_induced), sDir));

  // UI text
  const s = document.getElementById('status');
  const e = document.getElementById('explain');
  const changing = Math.abs(dVoltDt) > 0.08;
  if(changing && switchOn){
    s.className = 'induced';
    if(dVoltDt>0){
      s.textContent = '⚡ Corrente primaria in aumento — f.e.m. indotta nella bobina secondaria!';
      e.innerHTML   = 'La corrente nella <strong>bobina primaria</strong> sta <em>aumentando</em>: il campo magnetico nel nucleo di ferro varia rapidamente → si induce una forza elettromotrice nella bobina secondaria. La lampada si accende! ✦';
    } else {
      s.textContent = '⚡ Corrente primaria in diminuzione — f.e.m. indotta in verso opposto!';
      e.innerHTML   = 'La corrente nella <strong>bobina primaria</strong> sta <em>diminuendo</em>: per la <strong>legge di Lenz</strong>, la corrente indotta oppone la variazione. La lampada si riaccende brevemente con verso invertito! ✦';
    }
  } else if(switchOn && I_primary > 0.05 && !changing){
    s.className   = 'active';
    s.textContent = '● Corrente costante — nessuna induzione nella bobina secondaria';
    e.innerHTML   = 'La corrente nella bobina primaria è <strong>stazionaria</strong>: il campo magnetico non varia, quindi <em>nessuna f.e.m. è indotta</em>. <strong>Varia la tensione</strong> con il cursore per vedere l\'induzione!';
  } else if(!switchOn && I_primary < 0.02){
    s.className   = '';
    s.textContent = 'Interruttore aperto — nessuna corrente';
    e.innerHTML   = 'Chiudi l\'interruttore e <em>varia la tensione</em> con il cursore per indurre corrente nella <strong>bobina secondaria</strong>. Solo la <em>variazione</em> della corrente genera una forza elettromotrice.';
  }
}

// ─── Draw scene ────────────────────────────────────────────
function draw(){
  ctx.clearRect(0,0,W,H);
  const bg=ctx.createRadialGradient(W*0.5,H*0.5,H*0.05,W*0.5,H*0.5,H*0.9);
  bg.addColorStop(0,'#161824'); bg.addColorStop(1,'#080910');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  const priColor = '#c87828';
  const secColor = '#2868d0';

  // ── 1. Back wires (behind ring) ──
  // Primary bottom arc behind ring
  ctx.save();
  ctx.strokeStyle=priColor; ctx.lineWidth=2.2;
  ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.globalAlpha=0.28;
  ctx.beginPath();
  ctx.moveTo(lbPt.x,lbPt.y);
  ctx.lineTo(lbPt.x,WIRE_BOT_Y);
  ctx.lineTo(BAT_X,WIRE_BOT_Y);
  ctx.stroke();
  ctx.restore();

  // Secondary bottom arc behind ring
  ctx.save();
  ctx.strokeStyle=secColor; ctx.lineWidth=2.2;
  ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.globalAlpha=0.28;
  ctx.beginPath();
  ctx.moveTo(BULB_X,WIRE_BOT_Y_R);
  ctx.lineTo(rbPt.x,WIRE_BOT_Y_R);
  ctx.lineTo(rbPt.x,rbPt.y);
  ctx.stroke();
  ctx.restore();

  // ── 2. Dots that are behind ring ──
  priDots.forEach(d=>{ if(d.isBehind()) d.draw(0.3); });
  secDots.forEach(d=>{ if(d.isBehind()) d.draw(0.3); });

  // ── 3. Ring ──
  drawRing();

  // ── 4. Coils (on top of ring) ──
  drawCoil(L_TOP_ANG, L_BOT_ANG, priColor, '#f0c060', 'bobina primaria',    I_primary);
  drawCoil(R_TOP_ANG, R_BOT_ANG, secColor, '#60aaff', 'bobina secondaria', Math.abs(I_induced));

  // ── 5. Front wires ──
  // Primary: battery → switch top, switch → coil top
  ctx.save();
  ctx.strokeStyle=priColor; ctx.lineWidth=3.0; ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.shadowBlur=8; ctx.shadowColor=priColor;

  ctx.beginPath();
  ctx.moveTo(BAT_X,BAT_Y-30);
  ctx.lineTo(BAT_X,WIRE_TOP_Y);
  ctx.lineTo(SW_X,WIRE_TOP_Y);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(SW_X+30,WIRE_TOP_Y);
  ctx.lineTo(ltPt.x,WIRE_TOP_Y);
  ctx.lineTo(ltPt.x,ltPt.y);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(BAT_X,BAT_Y+30);
  ctx.lineTo(BAT_X,WIRE_BOT_Y);
  ctx.stroke();
  ctx.restore();

  // Secondary: coil → bulb
  ctx.save();
  ctx.strokeStyle=secColor; ctx.lineWidth=3.0; ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.shadowBlur=8; ctx.shadowColor=secColor;
  ctx.beginPath();
  ctx.moveTo(rtPt.x,rtPt.y);
  ctx.lineTo(rtPt.x,WIRE_TOP_Y_R);
  ctx.lineTo(BULB_X,WIRE_TOP_Y_R);
  ctx.lineTo(BULB_X,BULB_Y-24);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(BULB_X,BULB_Y+10+18);
  ctx.lineTo(BULB_X,WIRE_BOT_Y_R);
  ctx.stroke();
  ctx.restore();

  // ── 6. Components ──
  drawBattery(BAT_X, BAT_Y, voltActual/12);
  drawSwitch(SW_X, SW_Y, switchOn);
  drawBulb(BULB_X, BULB_Y, bulbBri);

  // ── 7. Front dots (above ring) ──
  priDots.forEach(d=>{ if(!d.isBehind()) d.draw(1.0); });
  secDots.forEach(d=>{ if(!d.isBehind()) d.draw(1.0); });
}

// ─── Loop ──────────────────────────────────────────────────
function loop(ts){
  const dt=lastTs?Math.min((ts-lastTs)/1000,0.05):0.016;
  lastTs=ts; update(dt); draw();
  requestAnimationFrame(loop);
}

// ─── Controls ──────────────────────────────────────────────
function toggleSwitch(){
  switchOn=!switchOn;
  const b=document.getElementById('sw-btn');
  b.className=switchOn?'on':'';
  b.textContent=switchOn?'⏽  Interruttore':'◯  Interruttore';
}
document.addEventListener('keydown',e=>{ if(e.code==='Space'){e.preventDefault();toggleSwitch();} });
requestAnimationFrame(loop);
</script>
</body>
